<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Left: Perfect store wardrobe -->
  <rect x="25" y="50" width="155" height="185" fill="#0d1530" stroke="#555" stroke-width="1.5" rx="6"/>
  <text x="102" y="70" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888" font-weight="bold">КУПЛЕННЫЙ</text>
  <text x="102" y="83" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">идеальный</text>
  <!-- Perfect wardrobe shape -->
  <rect x="50" y="95" width="105" height="120" fill="#1e2a3a" stroke="#4a90d9" stroke-width="1.5" rx="3"/>
  <line x1="102" y1="95" x2="102" y2="215" stroke="#4a90d9" stroke-width="1"/>
  <circle cx="92" cy="155" r="4" fill="#4a90d9" opacity="0.6"/>
  <circle cx="112" cy="155" r="4" fill="#4a90d9" opacity="0.6"/>
  <!-- Perfect symbol -->
  <text x="102" y="232" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#4a90d9" opacity="0.5">✓</text>
  <!-- Price tag -->
  <rect x="60" y="100" width="44" height="20" rx="3" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="82" y="114" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">$200</text>
  <!-- Value arrow (small) -->
  <rect x="40" y="238" width="125" height="22" fill="#1a1a3a" rx="4"/>
  <text x="102" y="253" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">Ценность: $200</text>

  <!-- Center comparison -->
  <text x="200" y="145" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#e8c44a" opacity="0.4" font-weight="bold">≺</text>
  <text x="200" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e8c44a">вы цените</text>
  <text x="200" y="183" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e8c44a">меньше</text>

  <!-- Right: DIY IKEA wardrobe (slightly crooked) -->
  <rect x="220" y="50" width="155" height="185" fill="#0d1530" stroke="#e8c44a" stroke-width="1.5" rx="6"/>
  <text x="297" y="70" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8c44a" font-weight="bold">СОБРАННЫЙ</text>
  <text x="297" y="83" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#888">3 часа труда</text>
  <!-- Slightly crooked wardrobe -->
  <g transform="rotate(2, 297, 155)">
    <rect x="244" y="95" width="105" height="120" fill="#2a2a1a" stroke="#e8c44a" stroke-width="1.5" rx="3"/>
    <line x1="296" y1="95" x2="296" y2="215" stroke="#e8c44a" stroke-width="1"/>
    <circle cx="286" cy="155" r="4" fill="#e8c44a" opacity="0.7"/>
    <circle cx="306" cy="155" r="4" fill="#e8c44a" opacity="0.7"/>
  </g>
  <!-- Tools scattered -->
  <text x="235" y="110" font-family="sans-serif" font-size="10" fill="#888" opacity="0.6">🔧</text>
  <text x="340" y="215" font-family="sans-serif" font-size="10" fill="#888" opacity="0.6">📋</text>
  <!-- Heart (love for own creation) -->
  <text x="297" y="234" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e85d5d" opacity="0.8">♥</text>
  <!-- Value arrow (large) -->
  <rect x="230" y="238" width="135" height="22" fill="#2a2a1a" rx="4" stroke="#e8c44a" stroke-width="1"/>
  <text x="297" y="253" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e8c44a" font-weight="bold">Ценность: $350 ↑</text>

  <!-- Bottom principle -->
  <rect x="20" y="258" width="360" height="32" fill="#0d1530" rx="8"/>
  <text x="200" y="273" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">Вложенный труд создаёт иллюзию ценности</text>
  <text x="200" y="285" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">Нортон, Моттен, Ариэли · 2012</text>
</svg>
