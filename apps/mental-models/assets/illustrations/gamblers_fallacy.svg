<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Row of 9 heads coins -->
  <text x="200" y="45" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">9 орлов подряд →</text>
  <!-- Coins row -->
  <circle cx="50" cy="100" r="18" fill="#f7d060" opacity="0.9"/>
  <text x="50" y="105" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="11" font-weight="bold">О</text>
  <circle cx="88" cy="100" r="18" fill="#f7d060" opacity="0.9"/>
  <text x="88" y="105" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="11" font-weight="bold">О</text>
  <circle cx="126" cy="100" r="18" fill="#f7d060" opacity="0.9"/>
  <text x="126" y="105" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="11" font-weight="bold">О</text>
  <circle cx="164" cy="100" r="18" fill="#f7d060" opacity="0.9"/>
  <text x="164" y="105" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="11" font-weight="bold">О</text>
  <circle cx="202" cy="100" r="18" fill="#f7d060" opacity="0.9"/>
  <text x="202" y="105" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="11" font-weight="bold">О</text>
  <circle cx="240" cy="100" r="18" fill="#f7d060" opacity="0.9"/>
  <text x="240" y="105" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="11" font-weight="bold">О</text>
  <circle cx="278" cy="100" r="18" fill="#f7d060" opacity="0.9"/>
  <text x="278" y="105" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="11" font-weight="bold">О</text>
  <circle cx="316" cy="100" r="18" fill="#f7d060" opacity="0.9"/>
  <text x="316" y="105" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="11" font-weight="bold">О</text>
  <circle cx="354" cy="100" r="18" fill="#f7d060" opacity="0.9"/>
  <text x="354" y="105" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="11" font-weight="bold">О</text>
  <!-- Big red arrow pointing down to tails -->
  <line x1="200" y1="135" x2="200" y2="175" stroke="#cc4444" stroke-width="4" stroke-linecap="round"/>
  <polygon points="200,185 192,170 208,170" fill="#cc4444"/>
  <!-- "Must be tails" coin -->
  <circle cx="200" cy="215" r="28" fill="#2a2a4a" stroke="#cc4444" stroke-width="2.5"/>
  <text x="200" y="222" text-anchor="middle" fill="#cc4444" font-family="sans-serif" font-size="15" font-weight="bold">«Р!»</text>
  <!-- Reality label -->
  <text x="200" y="270" text-anchor="middle" fill="#4a9a4a" font-family="sans-serif" font-size="11">Реальность: всё равно 50% · монета не помнит</text>
</svg>
