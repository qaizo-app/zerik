<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Classroom line divider -->
  <line x1="200" y1="50" x2="200" y2="240" stroke="#444" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Left group: Blue eyes (privileged day 1) -->
  <text x="100" y="42" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4a90d9" font-weight="bold">Голубоглазые</text>
  <!-- 4 student figures left -->
  <g fill="#4a90d9" opacity="0.9">
    <circle cx="60" cy="90" r="12"/>
    <rect x="52" y="104" width="16" height="28" rx="3"/>
    <circle cx="110" cy="85" r="12"/>
    <rect x="102" y="99" width="16" height="28" rx="3"/>
    <circle cx="60" cy="160" r="12"/>
    <rect x="52" y="174" width="16" height="28" rx="3"/>
    <circle cx="110" cy="155" r="12"/>
    <rect x="102" y="169" width="16" height="28" rx="3"/>
  </g>
  <!-- Blue eyes dots -->
  <circle cx="57" cy="89" r="2.5" fill="#1a1a2e"/>
  <circle cx="63" cy="89" r="2.5" fill="#1a1a2e"/>
  <circle cx="107" cy="84" r="2.5" fill="#1a1a2e"/>
  <circle cx="113" cy="84" r="2.5" fill="#1a1a2e"/>
  <!-- Crown/privilege badge for blue eyes -->
  <g fill="#e8c44a" opacity="0.8">
    <polygon points="60,73 55,80 65,80" />
    <polygon points="110,68 105,75 115,75" />
  </g>
  <!-- Test score up arrow -->
  <text x="80" y="218" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4adf8a">↑ Результаты тестов</text>
  <!-- Right group: Brown eyes (disadvantaged day 1) -->
  <text x="300" y="42" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8B4513" font-weight="bold">Кареглазые</text>
  <g fill="#8B4513" opacity="0.85">
    <circle cx="240" cy="90" r="12"/>
    <rect x="232" y="104" width="16" height="28" rx="3"/>
    <circle cx="290" cy="85" r="12"/>
    <rect x="282" y="99" width="16" height="28" rx="3"/>
    <circle cx="240" cy="160" r="12"/>
    <rect x="232" y="174" width="16" height="28" rx="3"/>
    <circle cx="290" cy="155" r="12"/>
    <rect x="282" y="169" width="16" height="28" rx="3"/>
    <circle cx="340" cy="118" r="12"/>
    <rect x="332" y="132" width="16" height="28" rx="3"/>
  </g>
  <!-- Brown eyes -->
  <circle cx="237" cy="89" r="2.5" fill="#3d1a00"/>
  <circle cx="243" cy="89" r="2.5" fill="#3d1a00"/>
  <circle cx="337" cy="117" r="2.5" fill="#3d1a00"/>
  <circle cx="343" cy="117" r="2.5" fill="#3d1a00"/>
  <!-- Collar/disadvantage marker -->
  <rect x="231" y="101" width="18" height="5" fill="#e85d5d" rx="2" opacity="0.7"/>
  <rect x="281" y="96" width="18" height="5" fill="#e85d5d" rx="2" opacity="0.7"/>
  <!-- Score down arrow -->
  <text x="290" y="218" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d">↓ Результаты тестов</text>
  <!-- Teacher figure (bottom center) -->
  <circle cx="200" cy="260" r="10" fill="#888"/>
  <rect x="194" y="272" width="12" height="18" rx="2" fill="#888"/>
  <text x="200" y="298" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#aaa">Jane Elliott, 1968</text>
  <!-- Bottom note -->
  <rect x="20" y="232" width="360" height="20" fill="#0d1530" rx="4"/>
  <text x="200" y="246" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aaa">Разделение по цвету глаз — одинаковый эффект за несколько часов</text>
</svg>
