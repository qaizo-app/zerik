<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Left pod -->
  <rect x="30" y="80" width="100" height="160" rx="10" fill="#2a2a4a" stroke="#6c8ebf" stroke-width="2"/>
  <rect x="55" y="100" width="50" height="120" rx="8" fill="#1a1a2e" opacity="0.6"/>
  <!-- Person in left pod -->
  <circle cx="80" cy="140" r="16" fill="#f7d060"/>
  <rect x="66" y="158" width="28" height="45" rx="6" fill="#f7d060"/>
  <!-- Right pod -->
  <rect x="270" y="80" width="100" height="160" rx="10" fill="#2a2a4a" stroke="#6c8ebf" stroke-width="2"/>
  <rect x="295" y="100" width="50" height="120" rx="8" fill="#1a1a2e" opacity="0.6"/>
  <!-- Person in right pod -->
  <circle cx="320" cy="140" r="16" fill="#f7d060"/>
  <rect x="306" y="158" width="28" height="45" rx="6" fill="#f7d060"/>
  <!-- Question mark in middle -->
  <text x="200" y="145" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="52" font-weight="bold">?</text>
  <!-- Particle stream -->
  <line x1="130" y1="155" x2="175" y2="155" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="225" y1="155" x2="270" y2="155" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Dots -->
  <circle cx="148" cy="155" r="3" fill="#6c8ebf" opacity="0.7"/>
  <circle cx="163" cy="145" r="2" fill="#6c8ebf" opacity="0.5"/>
  <circle cx="238" cy="155" r="3" fill="#6c8ebf" opacity="0.7"/>
  <circle cx="253" cy="165" r="2" fill="#6c8ebf" opacity="0.5"/>
  <!-- Labels -->
  <text x="80" y="260" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Оригинал</text>
  <text x="320" y="260" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Копия?</text>
  <text x="200" y="260" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="11">Тот же?</text>
</svg>
