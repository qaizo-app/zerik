<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Ground line -->
  <line x1="0" y1="230" x2="400" y2="230" stroke="#3a3a5a" stroke-width="2"/>
  <!-- Road -->
  <rect x="0" y="220" width="400" height="80" fill="#2a2a3a" opacity="0.5"/>
  <!-- Fence posts and rails -->
  <rect x="148" y="145" width="12" height="85" rx="3" fill="#8b6914"/>
  <rect x="188" y="145" width="12" height="85" rx="3" fill="#8b6914"/>
  <rect x="228" y="145" width="12" height="85" rx="3" fill="#8b6914"/>
  <rect x="140" y="162" width="108" height="10" rx="3" fill="#a07820"/>
  <rect x="140" y="192" width="108" height="10" rx="3" fill="#a07820"/>
  <!-- WHY? floating above fence -->
  <text x="196" y="120" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="28" font-weight="bold">?</text>
  <line x1="196" y1="125" x2="196" y2="143" stroke="#f7d060" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Path from left (blocked) -->
  <line x1="10" y1="225" x2="138" y2="225" stroke="#aaaacc" stroke-width="3" stroke-linecap="round"/>
  <!-- Hammer hand stopped -->
  <circle cx="340" cy="170" r="16" fill="#6c8ebf" opacity="0.9"/>
  <rect x="327" y="186" width="26" height="35" rx="6" fill="#6c8ebf" opacity="0.9"/>
  <!-- Hammer -->
  <rect x="348" y="145" width="10" height="22" rx="3" fill="#888" transform="rotate(30 348 145)"/>
  <rect x="341" y="138" width="22" height="12" rx="3" fill="#aaa" transform="rotate(30 341 138)"/>
  <!-- STOP sign on hand -->
  <circle cx="360" cy="195" r="12" fill="#cc4444" opacity="0.85"/>
  <text x="360" y="200" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9" font-weight="bold">СТОП</text>
  <!-- Thought bubble from figure -->
  <text x="310" y="100" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="10">Зачем он здесь?</text>
  <line x1="325" y1="103" x2="338" y2="118" stroke="#aaaacc" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Bottom wisdom -->
  <text x="200" y="270" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="10">Непонимание — причина не сносить. Понимание — причина сносить.</text>
</svg>
