<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f0f1a"/>
  <!-- Water / lake -->
  <ellipse cx="200" cy="240" rx="180" ry="30" fill="#0a1a2a" opacity="0.8"/>
  <!-- Reflections in water -->
  <ellipse cx="70" cy="248" rx="20" ry="6" fill="#ddeeff" opacity="0.08"/>
  <ellipse cx="200" cy="252" rx="18" ry="5" fill="#000000" opacity="0.3"/>
  <ellipse cx="320" cy="248" rx="18" ry="5" fill="#ddeeff" opacity="0.07"/>
  <!-- White swans (3) -->
  <!-- Swan 1 -->
  <path d="M40,215 Q60,195 80,205 Q90,200 95,210 Q85,218 70,220 Q55,222 40,215" fill="#ddeeff"/>
  <circle cx="97" cy="207" r="8" fill="#ddeeff"/>
  <!-- Head/beak -->
  <path d="M100,205 Q108,202 112,205 Q108,208 100,207" fill="#cc6633"/>
  <!-- Neck curve -->
  <path d="M90,210 Q88,205 97,207" fill="none" stroke="#ddeeff" stroke-width="4"/>
  <!-- Swan 2 -->
  <path d="M140,210 Q162,188 184,198 Q196,192 200,204 Q188,214 172,216 Q156,218 140,210" fill="#e8eeff"/>
  <circle cx="202" cy="200" r="9" fill="#e8eeff"/>
  <path d="M206,198 Q215,194 220,198 Q215,202 206,200" fill="#cc6633"/>
  <path d="M196,204 Q193,198 202,200" fill="none" stroke="#e8eeff" stroke-width="5"/>
  <!-- Swan 3 -->
  <path d="M250,218 Q268,198 286,208 Q294,204 298,214 Q288,220 274,222 Q260,224 250,218" fill="#ccd8ee"/>
  <circle cx="300" cy="210" r="8" fill="#ccd8ee"/>
  <path d="M304,208 Q312,205 316,208 Q312,211 304,210" fill="#cc6633"/>
  <path d="M296,213 Q294,208 300,210" fill="none" stroke="#ccd8ee" stroke-width="4"/>
  <!-- BLACK SWAN (prominent, right) -->
  <path d="M300,192 Q330,162 360,178 Q374,170 378,184 Q362,196 345,200 Q322,204 300,192" fill="#111111"/>
  <circle cx="380" cy="180" r="11" fill="#111111" stroke="#333" stroke-width="1"/>
  <!-- Black swan eye -->
  <circle cx="383" cy="177" r="2.5" fill="#cc2200"/>
  <!-- Beak -->
  <path d="M385,180 Q396,177 400,181 Q396,184 385,182" fill="#cc5500"/>
  <!-- Neck -->
  <path d="M374,185 Q370,178 380,180" fill="none" stroke="#111111" stroke-width="6"/>
  <!-- Shock/attention marks around black swan -->
  <line x1="385" y1="162" x2="390" y2="155" stroke="#ff4422" stroke-width="1.5" opacity="0.8"/>
  <line x1="391" y1="168" x2="398" y2="163" stroke="#ff4422" stroke-width="1.5" opacity="0.8"/>
  <line x1="393" y1="178" x2="400" y2="176" stroke="#ff4422" stroke-width="1.5" opacity="0.7"/>
  <!-- Labels -->
  <text x="170" y="254" text-anchor="middle" font-size="10" fill="#aabbcc" font-family="sans-serif">expected</text>
  <text x="350" y="218" text-anchor="middle" font-size="10" fill="#cc2200" font-family="sans-serif">unexpected</text>
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-size="13" fill="#aabbcc" font-family="sans-serif" letter-spacing="1">THE BLACK SWAN</text>
  <text x="200" y="53" text-anchor="middle" font-size="10" fill="#445566" font-family="sans-serif">Taleb · 2007 · high-impact, unpredicted events</text>
</svg>
