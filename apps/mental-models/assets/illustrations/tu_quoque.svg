<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Person A (left) pointing at problem -->
  <circle cx="70" cy="120" r="20" fill="#6c8ebf"/>
  <rect x="55" y="142" width="30" height="40" rx="7" fill="#6c8ebf"/>
  <!-- Problem box -->
  <rect x="125" y="95" width="80" height="50" rx="8" fill="#2a1a1a" stroke="#cc4444" stroke-width="2"/>
  <text x="165" y="123" text-anchor="middle" fill="#cc4444" font-family="sans-serif" font-size="13" font-weight="bold">Проблема X</text>
  <!-- A's pointing finger -->
  <line x1="90" y1="125" x2="122" y2="120" stroke="#6c8ebf" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="124" cy="120" r="4" fill="#6c8ebf"/>
  <!-- Person B (right) turning finger back -->
  <circle cx="330" cy="120" r="20" fill="#cc6b8e"/>
  <rect x="315" y="142" width="30" height="40" rx="7" fill="#cc6b8e"/>
  <!-- B's counter-finger pointing back at A -->
  <line x1="310" y1="125" x2="278" y2="125" stroke="#cc6b8e" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="276" cy="125" r="4" fill="#cc6b8e"/>
  <!-- "А сам?" speech bubble -->
  <ellipse cx="255" cy="80" rx="60" ry="28" fill="#2a2a4a" stroke="#cc6b8e" stroke-width="1.5"/>
  <text x="255" y="74" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="11" font-weight="bold">А сам-то!</text>
  <text x="255" y="90" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="10">Tu quoque</text>
  <line x1="255" y1="108" x2="305" y2="118" stroke="#cc6b8e" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Problem X bubble ignored -->
  <text x="165" y="175" text-anchor="middle" fill="#6c6c8c" font-family="sans-serif" font-size="10">... без ответа</text>
  <!-- X over the argument bypass -->
  <text x="200" y="220" text-anchor="middle" fill="#cc4444" font-family="sans-serif" font-size="14" font-weight="bold">Аргумент остался без ответа</text>
  <text x="200" y="265" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="10">Лицемерие критика ≠ неверность критики</text>
</svg>
