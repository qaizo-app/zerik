<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Option A bar: 5% to 1% -->
  <text x="100" y="55" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Вариант A</text>
  <rect x="50" y="65" width="100" height="20" rx="4" fill="#4a4a7a"/>
  <rect x="50" y="65" width="100" height="20" rx="4" fill="#cc6b8e" opacity="0.5"/>
  <text x="100" y="79" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9">5%</text>
  <!-- Arrow down -->
  <line x1="100" y1="90" x2="100" y2="108" stroke="#4a9a4a" stroke-width="2"/>
  <rect x="50" y="112" width="20" height="20" rx="4" fill="#cc6b8e" opacity="0.8"/>
  <text x="60" y="126" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9">1%</text>
  <!-- Saving label -->
  <text x="100" y="150" text-anchor="middle" fill="#4a9a4a" font-family="sans-serif" font-size="11">−4% риска</text>
  <text x="100" y="165" text-anchor="middle" fill="#4a9a4a" font-family="sans-serif" font-size="10">400 смертей</text>
  <text x="100" y="180" text-anchor="middle" fill="#4a9a4a" font-family="sans-serif" font-size="9">сохранено</text>
  <!-- Option B bar: 1% to 0% -->
  <text x="280" y="55" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Вариант B</text>
  <rect x="230" y="65" width="20" height="20" rx="4" fill="#cc6b8e" opacity="0.8"/>
  <text x="240" y="79" text-anchor="middle" fill="white" font-family="sans-serif" font-size="9">1%</text>
  <!-- Arrow down to zero -->
  <line x1="280" y1="90" x2="280" y2="108" stroke="#cc6b8e" stroke-width="2"/>
  <!-- Zero circle -->
  <circle cx="280" cy="130" r="22" fill="#2a1a2a" stroke="#f7d060" stroke-width="3"/>
  <text x="280" y="137" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="22" font-weight="bold">0</text>
  <!-- Saving label B -->
  <text x="280" y="175" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="11">−1% риска</text>
  <text x="280" y="190" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="10">50 смертей</text>
  <text x="280" y="205" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="9">сохранено</text>
  <!-- Big arrow from B (chosen) -->
  <text x="280" y="230" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="20">←выбирают</text>
  <!-- Rational choice indicator -->
  <text x="100" y="230" text-anchor="middle" fill="#4a9a4a" font-family="sans-serif" font-size="14">★ лучше</text>
  <text x="200" y="270" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="10">Ноль — эмоциональное понятие, а не математическое</text>
</svg>
