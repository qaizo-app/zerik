<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="#EEF2FF"/>

  <!-- Outer ring of the self-referential loop -->
  <circle cx="200" cy="148" r="100" stroke="#6366F1" stroke-width="3" fill="none" opacity="0.3"/>
  <circle cx="200" cy="148" r="72" stroke="#6366F1" stroke-width="2.5" fill="none" opacity="0.5"/>
  <circle cx="200" cy="148" r="44" stroke="#6366F1" stroke-width="2" fill="none" opacity="0.8"/>

  <!-- Central question mark in the innermost circle -->
  <circle cx="200" cy="148" r="24" fill="#6366F1" opacity="0.15"/>
  <text x="200" y="156" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#4338CA">?</text>

  <!-- Arrow looping back on itself (self-reference) — arc arrow on outer ring -->
  <!-- Arrow arc: from top, going clockwise almost full circle, ending back near start -->
  <path d="M200 48 A100 100 0 1 1 165 52" stroke="#6366F1" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Arrowhead pointing back toward the start of the arc -->
  <polygon points="155,42 170,60 178,45" fill="#6366F1"/>

  <!-- Label: S = { x | x ∉ x } -->
  <rect x="100" y="264" width="200" height="28" rx="6" fill="#C7D2FE" opacity="0.8"/>
  <text x="200" y="283" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#3730A3" font-style="italic">S = &#123; x | x ∉ x &#125;</text>

  <!-- Small "?" dots orbiting the outer ring to indicate infinite regress -->
  <circle cx="200" cy="45" r="5" fill="#818CF8"/>
  <circle cx="299" cy="100" r="4" fill="#818CF8" opacity="0.7"/>
  <circle cx="299" cy="196" r="4" fill="#818CF8" opacity="0.55"/>
  <circle cx="200" cy="248" r="3.5" fill="#818CF8" opacity="0.4"/>
  <circle cx="101" cy="196" r="3.5" fill="#818CF8" opacity="0.4"/>
  <circle cx="101" cy="100" r="4" fill="#818CF8" opacity="0.55"/>

  <!-- Contradiction marks at top -->
  <text x="200" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#4338CA" opacity="0.75">∈ ↔ ∉</text>
</svg>
