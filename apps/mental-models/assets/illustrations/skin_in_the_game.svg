<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Scale/balance beam -->
  <line x1="200" y1="120" x2="200" y2="230" stroke="#6c8ebf" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="145" x2="320" y2="145" stroke="#6c8ebf" stroke-width="3" stroke-linecap="round"/>
  <!-- Left pan - advisor with empty hands -->
  <circle cx="80" cy="155" r="5" fill="#6c8ebf"/>
  <line x1="80" y1="160" x2="80" y2="190" stroke="#6c8ebf" stroke-width="1.5"/>
  <!-- Figure on left pan -->
  <circle cx="80" cy="175" r="16" fill="#5a5a7a" opacity="0.8"/>
  <rect x="66" y="192" width="28" height="28" rx="6" fill="#5a5a7a" opacity="0.8"/>
  <!-- Empty hands graphic -->
  <text x="80" y="235" text-anchor="middle" fill="#5a5a7a" font-family="sans-serif" font-size="10">пустые руки</text>
  <text x="80" y="248" text-anchor="middle" fill="#5a5a7a" font-family="sans-serif" font-size="9">(советует)</text>
  <!-- Right pan - advisor with resources -->
  <circle cx="320" cy="145" r="5" fill="#6c8ebf"/>
  <line x1="320" y1="150" x2="320" y2="175" stroke="#6c8ebf" stroke-width="1.5"/>
  <!-- Figure on right pan - lower (has weight) -->
  <circle cx="320" cy="175" r="16" fill="#f7d060" opacity="0.9"/>
  <rect x="306" y="192" width="28" height="28" rx="6" fill="#f7d060" opacity="0.9"/>
  <!-- Coin stack -->
  <rect x="335" y="188" width="14" height="6" rx="3" fill="#4a9a4a"/>
  <rect x="335" y="197" width="14" height="6" rx="3" fill="#4a9a4a"/>
  <rect x="335" y="206" width="14" height="6" rx="3" fill="#4a9a4a"/>
  <text x="320" y="235" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="10">вкладывает сам</text>
  <text x="320" y="248" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="9">(разделяет риск)</text>
  <!-- Tilt indicator: right pan lower -->
  <line x1="90" y1="140" x2="310" y2="150" stroke="#aaaacc" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- Triangle pivot -->
  <polygon points="200,115 190,130 210,130" fill="#6c8ebf"/>
  <text x="200" y="270" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Симметрия последствий — ключ к правильным стимулам</text>
</svg>
