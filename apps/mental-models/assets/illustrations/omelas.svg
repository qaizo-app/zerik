<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- City above -->
  <rect x="0" y="0" width="400" height="148" fill="#1a2a1a"/>
  <!-- Buildings -->
  <rect x="20" y="60" width="40" height="88" fill="#2a4a2a"/>
  <rect x="70" y="40" width="50" height="108" fill="#3a5a3a"/>
  <rect x="130" y="55" width="35" height="93" fill="#2a4a2a"/>
  <rect x="175" y="30" width="60" height="118" fill="#3a5a3a"/>
  <rect x="245" y="50" width="45" height="98" fill="#2a4a2a"/>
  <rect x="300" y="35" width="55" height="113" fill="#3a5a3a"/>
  <rect x="365" y="65" width="35" height="83" fill="#2a4a2a"/>
  <!-- Windows lit up -->
  <g fill="#e8c44a" opacity="0.7">
    <rect x="28" y="70" width="8" height="6" rx="1"/>
    <rect x="42" y="70" width="8" height="6" rx="1"/>
    <rect x="78" y="50" width="8" height="6" rx="1"/>
    <rect x="92" y="50" width="8" height="6" rx="1"/>
    <rect x="183" y="42" width="8" height="6" rx="1"/>
    <rect x="197" y="42" width="8" height="6" rx="1"/>
    <rect x="211" y="42" width="8" height="6" rx="1"/>
    <rect x="308" y="48" width="8" height="6" rx="1"/>
    <rect x="322" y="48" width="8" height="6" rx="1"/>
  </g>
  <!-- Festive lights -->
  <g stroke="#e8c44a" stroke-width="1" opacity="0.5">
    <line x1="20" y1="100" x2="420" y2="100"/>
  </g>
  <g fill="#e8c44a" opacity="0.6">
    <circle cx="40" cy="100" r="3"/>
    <circle cx="80" cy="100" r="3"/>
    <circle cx="120" cy="100" r="3"/>
    <circle cx="160" cy="100" r="3"/>
    <circle cx="200" cy="100" r="3"/>
    <circle cx="240" cy="100" r="3"/>
    <circle cx="280" cy="100" r="3"/>
    <circle cx="320" cy="100" r="3"/>
    <circle cx="360" cy="100" r="3"/>
  </g>
  <!-- Happy people -->
  <g fill="#c8a87c">
    <circle cx="60" cy="132" r="6"/>
    <circle cx="100" cy="128" r="6"/>
    <circle cx="155" cy="133" r="6"/>
    <circle cx="220" cy="128" r="6"/>
    <circle cx="290" cy="130" r="6"/>
    <circle cx="340" cy="132" r="6"/>
  </g>
  <text x="200" y="23" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4adf8a" font-weight="bold">ОМЕЛАС — счастливый город</text>
  <!-- Dividing line -->
  <line x1="0" y1="148" x2="400" y2="148" stroke="#e85d5d" stroke-width="2"/>
  <!-- Basement below -->
  <rect x="0" y="148" width="400" height="152" fill="#0d0d0d"/>
  <!-- Basement walls -->
  <rect x="140" y="165" width="120" height="90" fill="#0a0a0a" stroke="#555" stroke-width="1" rx="2"/>
  <!-- Child silhouette -->
  <circle cx="200" cy="200" r="10" fill="#333"/>
  <rect x="192" y="210" width="16" height="20" rx="3" fill="#2a2a2a"/>
  <!-- Huddled position (arms around knees) -->
  <path d="M190 215 Q185 230 195 235 Q205 235 210 225 Q205 215 200 215" fill="#2a2a2a"/>
  <!-- Small light beam from crack above -->
  <path d="M200 148 L185 175 L215 175 Z" fill="#e8c44a" opacity="0.05"/>
  <!-- Chains subtle -->
  <circle cx="200" cy="245" r="4" fill="none" stroke="#555" stroke-width="1.5"/>
  <line x1="196" y1="245" x2="185" y2="250" stroke="#555" stroke-width="1"/>
  <line x1="204" y1="245" x2="215" y2="250" stroke="#555" stroke-width="1"/>
  <text x="200" y="276" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">счастье города зависит от его страдания</text>
  <!-- Walking away figure (right) -->
  <circle cx="365" cy="195" r="7" fill="#c8a87c" opacity="0.6"/>
  <rect x="360" y="202" width="10" height="16" rx="2" fill="#4a4a6a" opacity="0.6"/>
  <path d="M375 210 L390 210" stroke="#87ceeb" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="365" y="228" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#87ceeb" opacity="0.8">уходит</text>
</svg>
