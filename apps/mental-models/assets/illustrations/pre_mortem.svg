<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f0f1a"/>
  <!-- Timeline arrow (left to right) -->
  <line x1="40" y1="150" x2="380" y2="150" stroke="#334455" stroke-width="2" marker-end="url(#arrGrey2)"/>
  <defs>
    <marker id="arrGrey2" markerWidth="7" markerHeight="7" refX="3" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#334455"/>
    </marker>
  </defs>
  <!-- NOW point -->
  <circle cx="80" cy="150" r="8" fill="#4caf8a"/>
  <text x="80" y="170" text-anchor="middle" font-size="10" fill="#4caf8a" font-family="sans-serif">NOW</text>
  <text x="80" y="184" text-anchor="middle" font-size="9" fill="#2a6a4a" font-family="sans-serif">plan looks</text>
  <text x="80" y="197" text-anchor="middle" font-size="9" fill="#2a6a4a" font-family="sans-serif">great!</text>
  <!-- Launch point -->
  <circle cx="180" cy="150" r="6" fill="#cc9933"/>
  <text x="180" y="170" text-anchor="middle" font-size="9" fill="#cc9933" font-family="sans-serif">launch</text>
  <!-- FUTURE FAILURE point (large X) -->
  <circle cx="320" cy="150" r="14" fill="#cc2200" opacity="0.9"/>
  <line x1="309" y1="139" x2="331" y2="161" stroke="#fff" stroke-width="3"/>
  <line x1="331" y1="139" x2="309" y2="161" stroke="#fff" stroke-width="3"/>
  <text x="320" y="175" text-anchor="middle" font-size="10" fill="#cc2200" font-family="sans-serif">FAILURE</text>
  <text x="320" y="188" text-anchor="middle" font-size="9" fill="#882211" font-family="sans-serif">1 year out</text>
  <!-- Mental time travel arrow: going back from future -->
  <path d="M305,135 Q220,80 100,135" fill="none" stroke="#7755cc" stroke-width="2.5" stroke-dasharray="7,4" marker-end="url(#arrPurple)"/>
  <defs>
    <marker id="arrPurple" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7755cc"/>
    </marker>
  </defs>
  <text x="200" y="72" text-anchor="middle" font-size="10" fill="#7755cc" font-family="sans-serif">mental time travel</text>
  <text x="200" y="88" text-anchor="middle" font-size="9" fill="#5533aa" font-family="sans-serif">"it already failed — why?"</text>
  <!-- Questions bubble at NOW -->
  <rect x="28" y="210" width="140" height="64" rx="7" fill="#111128" stroke="#7755cc" stroke-width="1.5"/>
  <text x="98" y="228" text-anchor="middle" font-size="9" fill="#7755cc" font-family="sans-serif">WHY DID IT FAIL?</text>
  <text x="98" y="242" text-anchor="middle" font-size="8" fill="#4433aa" font-family="sans-serif">• underestimated X?</text>
  <text x="98" y="254" text-anchor="middle" font-size="8" fill="#4433aa" font-family="sans-serif">• missed dependency Y?</text>
  <text x="98" y="266" text-anchor="middle" font-size="8" fill="#4433aa" font-family="sans-serif">• team conflict Z?</text>
  <!-- +30% risk discovery label -->
  <rect x="230" y="210" width="148" height="40" rx="7" fill="#112233" stroke="#4caf8a" stroke-width="1.5"/>
  <text x="304" y="227" text-anchor="middle" font-size="10" fill="#4caf8a" font-family="sans-serif">+30% more risks</text>
  <text x="304" y="242" text-anchor="middle" font-size="9" fill="#2a6a4a" font-family="sans-serif">discovered · Klein 1998</text>
  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-size="13" fill="#7755cc" font-family="sans-serif" letter-spacing="1">PRE-MORTEM</text>
  <text x="200" y="46" text-anchor="middle" font-size="10" fill="#443366" font-family="sans-serif">Klein · 1998 · prospective hindsight</text>
</svg>
