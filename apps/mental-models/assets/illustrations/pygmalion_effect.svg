<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Teacher figure left -->
  <circle cx="90" cy="120" r="22" fill="#6c8ebf"/>
  <rect x="74" y="144" width="32" height="50" rx="8" fill="#6c8ebf"/>
  <!-- Expectation beam from teacher to student -->
  <line x1="122" y1="130" x2="230" y2="110" stroke="#f7d060" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>
  <polygon points="230,110 218,104 218,116" fill="#f7d060" opacity="0.7"/>
  <!-- Star of expectation -->
  <text x="175" y="98" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="16">★</text>
  <!-- Student figure right -->
  <circle cx="280" cy="110" r="22" fill="#f7d060"/>
  <rect x="264" y="134" width="32" height="50" rx="8" fill="#f7d060"/>
  <!-- Growth bar for student -->
  <rect x="320" y="75" width="20" height="110" rx="4" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1"/>
  <rect x="320" y="105" width="20" height="80" rx="4" fill="#f7d060" opacity="0.5"/>
  <rect x="320" y="75" width="20" height="30" rx="4" fill="#4a9a4a" opacity="0.9"/>
  <!-- Arrow up -->
  <line x1="330" y1="65" x2="330" y2="45" stroke="#4a9a4a" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="330,35 324,50 336,50" fill="#4a9a4a"/>
  <!-- Teacher label -->
  <text x="90" y="210" text-anchor="middle" fill="#6c8ebf" font-family="sans-serif" font-size="11">Учитель</text>
  <!-- Student label -->
  <text x="280" y="210" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="11">«Расцветатель»</text>
  <!-- Eye symbol on teacher -->
  <text x="90" y="128" text-anchor="middle" fill="#1a1a2e" font-family="sans-serif" font-size="10">👁</text>
  <text x="200" y="270" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Ожидание → Изменение поведения → Рост</text>
</svg>
