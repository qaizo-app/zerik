  <ellipse cx="222" cy="165" rx="9" ry="9" fill="#251D15" stroke="#E89647" stroke-width="1.5" stroke-opacity="0.8"/>
  <rect x="214" y="175" width="16" height="25" rx="3" fill="#251D15" stroke="#E89647" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="218" y1="200" x2="214" y2="220" stroke="#E89647" stroke-width="1" stroke-opacity="0.8"/>
  <line x1="226" y1="200" x2="230" y2="220" stroke="#E89647" stroke-width="1" stroke-opacity="0.8"/>
