<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f0f1a"/>
  <!-- Vertical scale / bridge load diagram -->
  <!-- Scale bar -->
  <rect x="170" y="60" width="60" height="200" rx="5" fill="#111122" stroke="#334455" stroke-width="1.5"/>
  <!-- Real value marker (top) -->
  <rect x="150" y="72" width="100" height="22" rx="4" fill="#4caf8a" opacity="0.9"/>
  <text x="200" y="87" text-anchor="middle" font-size="10" fill="#fff" font-family="sans-serif" font-weight="bold">REAL VALUE</text>
  <!-- Buffer zone (middle) -->
  <rect x="160" y="96" width="80" height="80" rx="3" fill="#225544" opacity="0.6"/>
  <!-- Buffer label with braces -->
  <line x1="150" y1="96" x2="140" y2="96" stroke="#4caf8a" stroke-width="1.5"/>
  <line x1="150" y1="176" x2="140" y2="176" stroke="#cc8844" stroke-width="1.5"/>
  <line x1="140" y1="96" x2="140" y2="176" stroke="#886644" stroke-width="1.5"/>
  <text x="110" y="132" text-anchor="middle" font-size="9" fill="#886644" font-family="sans-serif">MARGIN</text>
  <text x="110" y="145" text-anchor="middle" font-size="9" fill="#886644" font-family="sans-serif">OF</text>
  <text x="110" y="158" text-anchor="middle" font-size="9" fill="#886644" font-family="sans-serif">SAFETY</text>
  <!-- Buffer pattern (hatch) -->
  <line x1="162" y1="100" x2="238" y2="100" stroke="#336644" stroke-width="1" opacity="0.5"/>
  <line x1="162" y1="115" x2="238" y2="115" stroke="#336644" stroke-width="1" opacity="0.5"/>
  <line x1="162" y1="130" x2="238" y2="130" stroke="#336644" stroke-width="1" opacity="0.5"/>
  <line x1="162" y1="145" x2="238" y2="145" stroke="#336644" stroke-width="1" opacity="0.5"/>
  <line x1="162" y1="160" x2="238" y2="160" stroke="#336644" stroke-width="1" opacity="0.5"/>
  <line x1="162" y1="174" x2="238" y2="174" stroke="#336644" stroke-width="1" opacity="0.5"/>
  <!-- Purchase price marker (bottom of buffer) -->
  <rect x="150" y="178" width="100" height="22" rx="4" fill="#cc8844" opacity="0.9"/>
  <text x="200" y="193" text-anchor="middle" font-size="10" fill="#fff" font-family="sans-serif" font-weight="bold">BUY PRICE</text>
  <!-- Error zone indicator (below purchase) -->
  <rect x="160" y="202" width="80" height="42" rx="3" fill="#441111" opacity="0.6"/>
  <text x="200" y="220" text-anchor="middle" font-size="9" fill="#cc4444" font-family="sans-serif">error zone</text>
  <text x="200" y="233" text-anchor="middle" font-size="9" fill="#883322" font-family="sans-serif">(still protected)</text>
  <!-- Scale markings -->
  <text x="245" y="77" font-size="9" fill="#4caf8a" font-family="sans-serif">high</text>
  <text x="245" y="137" font-size="9" fill="#886644" font-family="sans-serif">buffer</text>
  <text x="245" y="193" font-size="9" fill="#cc8844" font-family="sans-serif">pay</text>
  <text x="245" y="228" font-size="9" fill="#cc4444" font-family="sans-serif">error</text>
  <!-- Graham quote -->
  <text x="200" y="263" text-anchor="middle" font-size="10" fill="#4caf8a" font-family="sans-serif">"Price is what you pay.</text>
  <text x="200" y="277" text-anchor="middle" font-size="10" fill="#4caf8a" font-family="sans-serif">Value is what you get." — Buffett</text>
  <!-- Title -->
  <text x="200" y="32" text-anchor="middle" font-size="13" fill="#4caf8a" font-family="sans-serif" letter-spacing="1">MARGIN OF SAFETY</text>
  <text x="200" y="50" text-anchor="middle" font-size="10" fill="#2a6a4a" font-family="sans-serif">Graham · 1949 · the buffer between assumptions and reality</text>
</svg>
