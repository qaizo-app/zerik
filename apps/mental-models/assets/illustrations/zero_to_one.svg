<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Number line -->
  <line x1="40" y1="160" x2="360" y2="160" stroke="#4a4a7a" stroke-width="2"/>
  <!-- 0 marker -->
  <circle cx="80" cy="160" r="6" fill="#6c8ebf"/>
  <text x="80" y="180" text-anchor="middle" fill="#6c8ebf" font-family="sans-serif" font-size="14" font-weight="bold">0</text>
  <!-- 1 marker -->
  <circle cx="200" cy="160" r="6" fill="#f7d060"/>
  <text x="200" y="180" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="14" font-weight="bold">1</text>
  <!-- n markers (multiple companies) -->
  <circle cx="260" cy="160" r="4" fill="#aaaacc" opacity="0.7"/>
  <circle cx="300" cy="160" r="4" fill="#aaaacc" opacity="0.7"/>
  <circle cx="340" cy="160" r="4" fill="#aaaacc" opacity="0.7"/>
  <text x="300" y="180" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="14">n</text>
  <!-- Many arrows from 1 to n (competitors copying) -->
  <line x1="206" y1="155" x2="254" y2="155" stroke="#aaaacc" stroke-width="1.5" opacity="0.5"/>
  <line x1="206" y1="160" x2="294" y2="160" stroke="#aaaacc" stroke-width="1.5" opacity="0.4"/>
  <line x1="206" y1="165" x2="334" y2="165" stroke="#aaaacc" stroke-width="1.5" opacity="0.3"/>
  <!-- Single breakthrough arrow from 0 to 1 (upward) -->
  <path d="M80 145 Q140 60 194 145" stroke="#f7d060" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon points="194,145 185,133 198,132" fill="#f7d060"/>
  <!-- Lightning bolt at the peak -->
  <text x="140" y="90" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="20">⚡</text>
  <!-- Labels -->
  <text x="140" y="110" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="10">инновация</text>
  <text x="300" y="140" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="10">копирование</text>
  <text x="80" y="200" text-anchor="middle" fill="#6c8ebf" font-family="sans-serif" font-size="10">ничего</text>
  <text x="200" y="200" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="10">что-то новое</text>
  <text x="200" y="265" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Перейти от 0 к 1 — создать. Остальное — скопировать.</text>
</svg>
