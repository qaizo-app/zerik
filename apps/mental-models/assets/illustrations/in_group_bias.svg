<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- In-group (left, bright) -->
  <circle cx="90" cy="120" r="20" fill="#f7d060" opacity="0.95"/>
  <circle cx="135" cy="105" r="20" fill="#f7d060" opacity="0.9"/>
  <circle cx="90" cy="160" r="20" fill="#f7d060" opacity="0.9"/>
  <circle cx="135" cy="165" r="20" fill="#f7d060" opacity="0.85"/>
  <!-- Resource pile near in-group -->
  <rect x="155" y="155" width="35" height="20" rx="5" fill="#4a9a4a" opacity="0.9"/>
  <rect x="160" y="135" width="25" height="20" rx="5" fill="#4a9a4a" opacity="0.7"/>
  <text x="172" y="178" text-anchor="middle" fill="white" font-family="sans-serif" font-size="8">ресурсы</text>
  <!-- "Our group" label -->
  <text x="112" y="215" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="12" font-weight="bold">«Наши»</text>
  <!-- Out-group (right, shadowed) -->
  <circle cx="290" cy="120" r="20" fill="#5a5a7a" opacity="0.6"/>
  <circle cx="335" cy="105" r="20" fill="#5a5a7a" opacity="0.5"/>
  <circle cx="290" cy="160" r="20" fill="#5a5a7a" opacity="0.55"/>
  <circle cx="335" cy="165" r="20" fill="#5a5a7a" opacity="0.5"/>
  <!-- Out-group label -->
  <text x="312" y="215" text-anchor="middle" fill="#5a5a7a" font-family="sans-serif" font-size="12" font-weight="bold">«Чужие»</text>
  <!-- Dividing wall -->
  <rect x="198" y="60" width="4" height="200" fill="#3a3a5a"/>
  <!-- Bias arrow -->
  <path d="M185 100 Q200 80 215 100" stroke="#cc6b8e" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <text x="200" y="78" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="11">предвзятость</text>
  <!-- Minimal group trigger -->
  <text x="200" y="270" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="10">Достаточно любой группы: даже случайной</text>
</svg>
