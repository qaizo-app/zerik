<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Left figure: conscious (colorful inner light) -->
  <ellipse cx="100" cy="155" rx="60" ry="80" fill="#1e2e4e" stroke="#6c8ebf" stroke-width="2"/>
  <!-- Inner glow -->
  <ellipse cx="100" cy="160" rx="35" ry="50" fill="#2a4a7a" opacity="0.6"/>
  <ellipse cx="100" cy="165" rx="18" ry="28" fill="#4a7abb" opacity="0.5"/>
  <!-- Qualia colors -->
  <circle cx="88" cy="148" r="6" fill="#f7d060" opacity="0.8"/>
  <circle cx="112" cy="155" r="6" fill="#cc6b8e" opacity="0.8"/>
  <circle cx="100" cy="170" r="6" fill="#4a9a4a" opacity="0.8"/>
  <!-- Face, conscious -->
  <circle cx="100" cy="105" r="22" fill="#6c8ebf"/>
  <circle cx="93" cy="101" r="3" fill="#1a1a2e"/>
  <circle cx="107" cy="101" r="3" fill="#1a1a2e"/>
  <path d="M93 110 Q100 116 107 110" stroke="#1a1a2e" stroke-width="2" fill="none"/>
  <text x="100" y="255" text-anchor="middle" fill="#6c8ebf" font-family="sans-serif" font-size="11">Сознательный</text>
  <!-- Right figure: zombie (dark inside) -->
  <ellipse cx="300" cy="155" rx="60" ry="80" fill="#1e1e2e" stroke="#5a5a7a" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Dark interior -->
  <ellipse cx="300" cy="160" rx="35" ry="50" fill="#1a1a2a" opacity="0.8"/>
  <!-- Face, zombie - identical outside -->
  <circle cx="300" cy="105" r="22" fill="#5a5a7a"/>
  <circle cx="293" cy="101" r="3" fill="#1a1a2e"/>
  <circle cx="307" cy="101" r="3" fill="#1a1a2e"/>
  <path d="M293 110 Q300 116 307 110" stroke="#1a1a2e" stroke-width="2" fill="none"/>
  <text x="300" y="255" text-anchor="middle" fill="#5a5a7a" font-family="sans-serif" font-size="11">Философский зомби</text>
  <!-- Question mark in dark interior -->
  <text x="300" y="175" text-anchor="middle" fill="#3a3a5a" font-family="sans-serif" font-size="36" font-weight="bold">?</text>
  <!-- Equals sign in middle -->
  <text x="200" y="155" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="22">=?</text>
  <text x="200" y="175" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="10">снаружи</text>
</svg>
