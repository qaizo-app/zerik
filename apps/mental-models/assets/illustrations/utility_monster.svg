<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Large monster figure -->
  <ellipse cx="270" cy="155" rx="75" ry="80" fill="#2a1a3a" stroke="#cc6b8e" stroke-width="2"/>
  <text x="270" y="145" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="36">👾</text>
  <text x="270" y="185" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="12" font-weight="bold">Монстр</text>
  <text x="270" y="200" text-anchor="middle" fill="#8888aa" font-family="sans-serif" font-size="10">счастье ×1000</text>
  <!-- Small human figures giving resources -->
  <circle cx="80" cy="110" r="14" fill="#f7d060" opacity="0.8"/>
  <circle cx="80" cy="155" r="14" fill="#f7d060" opacity="0.8"/>
  <circle cx="80" cy="200" r="14" fill="#f7d060" opacity="0.8"/>
  <!-- Arrows from humans to monster -->
  <line x1="95" y1="110" x2="190" y2="140" stroke="#f7d060" stroke-width="1.5" opacity="0.6"/>
  <line x1="95" y1="155" x2="190" y2="155" stroke="#f7d060" stroke-width="1.5" opacity="0.6"/>
  <line x1="95" y1="200" x2="190" y2="170" stroke="#f7d060" stroke-width="1.5" opacity="0.6"/>
  <!-- Resource packages -->
  <rect x="105" y="103" width="22" height="14" rx="3" fill="#4a9a4a" opacity="0.8"/>
  <rect x="105" y="148" width="22" height="14" rx="3" fill="#4a9a4a" opacity="0.8"/>
  <rect x="105" y="193" width="22" height="14" rx="3" fill="#4a9a4a" opacity="0.8"/>
  <!-- Utility scale -->
  <rect x="355" y="80" width="18" height="160" rx="4" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1"/>
  <rect x="355" y="82" width="18" height="140" rx="4" fill="#cc6b8e" opacity="0.7"/>
  <text x="364" y="75" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="10">∑</text>
  <polygon points="364,55 358,68 370,68" fill="#cc6b8e"/>
  <text x="200" y="265" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="10">Max(суммарная польза) → всё монстру</text>
</svg>
