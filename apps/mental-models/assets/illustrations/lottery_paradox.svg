<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f0f1a"/>
  <!-- Lottery drum -->
  <ellipse cx="200" cy="130" rx="120" ry="80" fill="#1a1a2a" stroke="#446688" stroke-width="2.5"/>
  <ellipse cx="200" cy="100" rx="120" ry="30" fill="#111128" stroke="#334466" stroke-width="1.5"/>
  <!-- Drum stand -->
  <line x1="150" y1="210" x2="140" y2="250" stroke="#334455" stroke-width="4" stroke-linecap="round"/>
  <line x1="250" y1="210" x2="260" y2="250" stroke="#334455" stroke-width="4" stroke-linecap="round"/>
  <line x1="135" y1="250" x2="265" y2="250" stroke="#334455" stroke-width="5" stroke-linecap="round"/>
  <!-- Tickets inside drum - all labeled L (loser) -->
  <rect x="108" y="118" width="20" height="14" rx="3" fill="#223344" stroke="#445566" stroke-width="1"/>
  <text x="118" y="128" text-anchor="middle" font-size="8" fill="#cc4444" font-family="sans-serif">L</text>
  <rect x="134" y="108" width="20" height="14" rx="3" fill="#223344" stroke="#445566" stroke-width="1"/>
  <text x="144" y="118" text-anchor="middle" font-size="8" fill="#cc4444" font-family="sans-serif">L</text>
  <rect x="162" y="102" width="20" height="14" rx="3" fill="#223344" stroke="#445566" stroke-width="1"/>
  <text x="172" y="112" text-anchor="middle" font-size="8" fill="#cc4444" font-family="sans-serif">L</text>
  <rect x="190" y="100" width="20" height="14" rx="3" fill="#223344" stroke="#445566" stroke-width="1"/>
  <text x="200" y="110" text-anchor="middle" font-size="8" fill="#cc4444" font-family="sans-serif">L</text>
  <rect x="218" y="102" width="20" height="14" rx="3" fill="#223344" stroke="#445566" stroke-width="1"/>
  <text x="228" y="112" text-anchor="middle" font-size="8" fill="#cc4444" font-family="sans-serif">L</text>
  <rect x="244" y="108" width="20" height="14" rx="3" fill="#223344" stroke="#445566" stroke-width="1"/>
  <text x="254" y="118" text-anchor="middle" font-size="8" fill="#cc4444" font-family="sans-serif">L</text>
  <rect x="270" y="120" width="20" height="14" rx="3" fill="#223344" stroke="#445566" stroke-width="1"/>
  <text x="280" y="130" text-anchor="middle" font-size="8" fill="#cc4444" font-family="sans-serif">L</text>
  <!-- Lower row -->
  <rect x="120" y="146" width="20" height="14" rx="3" fill="#223344" stroke="#445566" stroke-width="1"/>
  <text x="130" y="156" text-anchor="middle" font-size="8" fill="#cc4444" font-family="sans-serif">L</text>
  <rect x="150" y="154" width="20" height="14" rx="3" fill="#223344" stroke="#445566" stroke-width="1"/>
  <text x="160" y="164" text-anchor="middle" font-size="8" fill="#cc4444" font-family="sans-serif">L</text>
  <!-- One glowing winner ticket -->
  <rect x="230" y="150" width="22" height="15" rx="3" fill="#ffcc00" stroke="#ffaa00" stroke-width="1.5"/>
  <text x="241" y="161" text-anchor="middle" font-size="8" fill="#333" font-family="sans-serif" font-weight="bold">W</text>
  <!-- Glow effect on winner -->
  <ellipse cx="241" cy="157" rx="18" ry="12" fill="#ffcc00" opacity="0.15"/>
  <!-- "..." indicating more tickets -->
  <text x="270" y="165" text-anchor="middle" font-size="14" fill="#334455" font-family="sans-serif">···</text>
  <!-- Contradiction labels -->
  <text x="200" y="220" text-anchor="middle" font-size="10" fill="#cc4444" font-family="sans-serif">I believe each ticket will lose</text>
  <text x="200" y="236" text-anchor="middle" font-size="10" fill="#ffcc00" font-family="sans-serif">but one must win</text>
  <!-- And symbol -->
  <text x="200" y="252" text-anchor="middle" font-size="10" fill="#886644" font-family="sans-serif">→ both beliefs rational, together: contradiction</text>
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-size="13" fill="#4455aa" font-family="sans-serif" letter-spacing="1">LOTTERY PARADOX</text>
  <text x="200" y="48" text-anchor="middle" font-size="10" fill="#334466" font-family="sans-serif">Kyburg · 1961 · rational belief vs. consistency</text>
</svg>
