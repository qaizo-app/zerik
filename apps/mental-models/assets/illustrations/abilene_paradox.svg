<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Desert road -->
  <rect x="0" y="195" width="400" height="60" fill="#2a2010"/>
  <line x1="200" y1="195" x2="200" y2="255" stroke="#e8c44a" stroke-width="2" stroke-dasharray="12,8" opacity="0.5"/>
  <!-- Sun/heat haze -->
  <circle cx="350" cy="50" r="25" fill="#e8c44a" opacity="0.15"/>
  <circle cx="350" cy="50" r="18" fill="#e8c44a" opacity="0.2"/>
  <!-- Road sign: Abilene -->
  <rect x="160" y="155" width="80" height="28" fill="#1e3a1e" stroke="#4adf8a" stroke-width="1.5" rx="3"/>
  <text x="200" y="173" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4adf8a" font-weight="bold">ABILENE →</text>
  <rect x="197" y="180" width="6" height="16" fill="#555"/>
  <!-- Car -->
  <rect x="130" y="198" width="140" height="45" fill="#3a5a8a" rx="6"/>
  <rect x="148" y="190" width="104" height="30" fill="#4a7aaa" rx="4"/>
  <!-- Windows -->
  <rect x="155" y="194" width="35" height="20" fill="#1a3a5a" rx="2" opacity="0.8"/>
  <rect x="210" y="194" width="35" height="20" fill="#1a3a5a" rx="2" opacity="0.8"/>
  <!-- Wheels -->
  <circle cx="165" cy="243" r="10" fill="#222" stroke="#555" stroke-width="2"/>
  <circle cx="235" cy="243" r="10" fill="#222" stroke="#555" stroke-width="2"/>
  <!-- 4 passengers with thought bubbles saying NO -->
  <!-- Person 1 -->
  <circle cx="165" cy="197" r="6" fill="#e8a87c"/>
  <ellipse cx="152" cy="183" rx="12" ry="8" fill="#2a1a3a" stroke="#e85d5d" stroke-width="1.5"/>
  <text x="152" y="186" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d" font-weight="bold">Нет!</text>
  <!-- Person 2 -->
  <circle cx="195" cy="197" r="6" fill="#e8a87c"/>
  <ellipse cx="182" cy="183" rx="12" ry="8" fill="#2a1a3a" stroke="#e85d5d" stroke-width="1.5"/>
  <text x="182" y="186" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d" font-weight="bold">Нет!</text>
  <!-- Person 3 -->
  <circle cx="222" cy="197" r="6" fill="#e8a87c"/>
  <ellipse cx="235" cy="183" rx="12" ry="8" fill="#2a1a3a" stroke="#e85d5d" stroke-width="1.5"/>
  <text x="235" y="186" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d" font-weight="bold">Нет!</text>
  <!-- Person 4 -->
  <circle cx="248" cy="197" r="6" fill="#e8a87c"/>
  <ellipse cx="261" cy="183" rx="12" ry="8" fill="#2a1a3a" stroke="#e85d5d" stroke-width="1.5"/>
  <text x="261" y="186" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d" font-weight="bold">Нет!</text>
  <!-- But they're all going label -->
  <text x="200" y="270" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e85d5d" font-weight="bold">Все молчат — все едут в Абилин</text>
  <!-- Explanation box -->
  <rect x="20" y="40" width="240" height="55" fill="#0d1530" rx="6"/>
  <text x="140" y="58" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aaa">Никто не хочет ехать.</text>
  <text x="140" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aaa">Каждый думает: «Остальные хотят».</text>
  <text x="140" y="86" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d">Молчание = плюралистическое невежество</text>
</svg>
