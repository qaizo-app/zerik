<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e8c44a" font-weight="bold">Парадокс Моравека</text>
  <!-- Left: Robot -->
  <rect x="25" y="45" width="155" height="210" fill="#0d1530" stroke="#4a90d9" stroke-width="1.5" rx="8"/>
  <text x="102" y="65" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4a90d9" font-weight="bold">КОМПЬЮТЕР / ИИ</text>
  <!-- Robot figure -->
  <rect x="72" y="80" width="60" height="50" rx="6" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1.5"/>
  <rect x="82" y="88" width="40" height="26" rx="3" fill="#0a1525"/>
  <!-- Screen with math on it -->
  <text x="102" y="103" text-anchor="middle" font-family="monospace" font-size="7" fill="#4adf8a">∫f(x)dx=42</text>
  <!-- Antennae -->
  <line x1="90" y1="80" x2="85" y2="68" stroke="#4a90d9" stroke-width="2"/>
  <circle cx="85" cy="66" r="3" fill="#4adf8a"/>
  <line x1="114" y1="80" x2="119" y2="68" stroke="#4a90d9" stroke-width="2"/>
  <circle cx="119" cy="66" r="3" fill="#4adf8a"/>
  <!-- Robot legs (simple) -->
  <rect x="85" y="130" width="14" height="25" rx="3" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1"/>
  <rect x="105" y="130" width="14" height="25" rx="3" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1"/>
  <!-- EASY tasks (chess, math) -->
  <rect x="35" y="162" width="135" height="82" fill="#1a2a1a" rx="4"/>
  <text x="102" y="176" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4adf8a" font-weight="bold">✓ ЛЕГКО</text>
  <text x="102" y="190" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#aaa">♟ Шахматы (1997)</text>
  <text x="102" y="203" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#aaa">∫ Математика</text>
  <text x="102" y="216" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#aaa">⚖ Логика / право</text>
  <text x="102" y="229" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#aaa">📊 Анализ данных</text>
  <!-- Hard task for robot: balance -->
  <text x="102" y="244" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e85d5d">✗ Поймать мяч</text>

  <!-- Right: Child / Human -->
  <rect x="220" y="45" width="155" height="210" fill="#0d1530" stroke="#e8c44a" stroke-width="1.5" rx="8"/>
  <text x="297" y="65" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8c44a" font-weight="bold">ЧЕЛОВЕК (3 года)</text>
  <!-- Child figure -->
  <circle cx="297" cy="100" r="20" fill="#e8c89c"/>
  <rect x="285" y="120" width="24" height="30" rx="4" fill="#9b59b6"/>
  <!-- Happy face -->
  <circle cx="290" cy="96" r="3" fill="#333"/>
  <circle cx="304" cy="96" r="3" fill="#333"/>
  <path d="M290 107 Q297 113 304 107" stroke="#c8a060" stroke-width="1.5" fill="none"/>
  <!-- Ball being caught -->
  <circle cx="340" cy="88" r="10" fill="#e85d5d" opacity="0.8"/>
  <path d="M330 95 Q315 100 310 115" stroke="#e8c44a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- EASY tasks for human -->
  <rect x="230" y="162" width="135" height="82" fill="#2a1a1a" rx="4"/>
  <text x="297" y="176" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e8c44a" font-weight="bold">✓ ЛЕГКО</text>
  <text x="297" y="190" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#aaa">🚶 Ходьба по любой</text>
  <text x="297" y="203" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#aaa">поверхности</text>
  <text x="297" y="216" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#aaa">👁 Узнать лицо</text>
  <text x="297" y="229" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#aaa">🤝 Понять иронию</text>
  <text x="297" y="244" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e85d5d">✗ Шахматный гроссм.</text>

  <!-- Center ≠ -->
  <text x="197" y="155" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#e8c44a" opacity="0.5" font-weight="bold">↔</text>
  <text x="197" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">500 млн лет</text>
  <text x="197" y="187" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">эволюции</text>
</svg>
