<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Spectrum bar -->
  <rect x="60" y="40" width="100" height="220" rx="6" fill="#0d1530" stroke="#333" stroke-width="1"/>
  <!-- Spectrum zones -->
  <rect x="62" y="42" width="96" height="36" rx="4" fill="#2a0d0d"/>
  <rect x="62" y="78" width="96" height="36" rx="4" fill="#3a1a1a"/>
  <rect x="62" y="114" width="96" height="36" rx="4" fill="#1a3a1a" stroke="#4adf8a" stroke-width="2"/>
  <rect x="62" y="150" width="96" height="36" rx="4" fill="#1a3a1a" stroke="#4adf8a" stroke-width="2"/>
  <rect x="62" y="186" width="96" height="36" rx="4" fill="#1a2a1a"/>
  <rect x="62" y="222" width="96" height="36" rx="4" fill="#0d1a0d"/>
  <!-- Labels -->
  <text x="110" y="65" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d">Немыслимое</text>
  <text x="110" y="101" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f08080">Радикальное</text>
  <text x="110" y="137" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4adf8a" font-weight="bold">Приемлемое</text>
  <text x="110" y="173" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4adf8a" font-weight="bold">Разумное</text>
  <text x="110" y="209" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87ceeb">Популярное</text>
  <text x="110" y="245" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5EEAD4">Закон</text>
  <!-- Window bracket -->
  <rect x="52" y="110" width="116" height="80" rx="4" fill="none" stroke="#e8c44a" stroke-width="2.5"/>
  <text x="110" y="105" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e8c44a" font-weight="bold">ОКНО ОВЕРТОНА</text>
  <!-- Arrows showing window can move -->
  <path d="M168 130 L220 90" stroke="#e8c44a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M168 170 L220 210" stroke="#e8c44a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="240" y="90" font-family="sans-serif" font-size="9" fill="#e8c44a">↑ движется</text>
  <text x="240" y="210" font-family="sans-serif" font-size="9" fill="#e8c44a">↓ движется</text>
  <!-- Right side: actors -->
  <rect x="230" y="105" width="140" height="110" fill="#0d1530" rx="6"/>
  <text x="300" y="122" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8c44a" font-weight="bold">Кто двигает окно</text>
  <g font-family="sans-serif" font-size="9" fill="#aaa">
    <text x="240" y="138">• Медиа и культура</text>
    <text x="240" y="153">• Активисты</text>
    <text x="240" y="168">• Кризисы и события</text>
    <text x="240" y="183">• Интеллектуалы</text>
    <text x="240" y="198">• Предприниматели</text>
  </g>
  <!-- Bottom note -->
  <rect x="20" y="235" width="360" height="42" fill="#0d1530" rx="6"/>
  <text x="200" y="252" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8c44a">Политик работает внутри окна.</text>
  <text x="200" y="268" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">Реформатор — сначала двигает окно.</text>
</svg>
