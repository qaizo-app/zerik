<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f0f1a"/>
  <!-- Speaker figure (left) -->
  <circle cx="90" cy="160" r="18" fill="#7799bb"/>
  <line x1="90" y1="178" x2="90" y2="218" stroke="#7799bb" stroke-width="3.5"/>
  <line x1="76" y1="192" x2="104" y2="192" stroke="#7799bb" stroke-width="2.5"/>
  <line x1="90" y1="218" x2="80" y2="238" stroke="#7799bb" stroke-width="2.5"/>
  <line x1="90" y1="218" x2="100" y2="238" stroke="#7799bb" stroke-width="2.5"/>
  <!-- Argument speech bubble -->
  <rect x="110" y="130" width="100" height="44" rx="8" fill="#223344"/>
  <polygon points="112,162 100,172 120,162" fill="#223344"/>
  <text x="160" y="148" text-anchor="middle" font-size="9" fill="#aabbcc" font-family="sans-serif">ARGUMENT:</text>
  <text x="160" y="161" text-anchor="middle" font-size="9" fill="#7799bb" font-family="sans-serif">evidence A</text>
  <text x="160" y="172" text-anchor="middle" font-size="9" fill="#7799bb" font-family="sans-serif">therefore B</text>
  <!-- Attacker figure (right) -->
  <circle cx="320" cy="160" r="18" fill="#cc5544"/>
  <line x1="320" y1="178" x2="320" y2="218" stroke="#cc5544" stroke-width="3.5"/>
  <line x1="306" y1="192" x2="334" y2="192" stroke="#cc5544" stroke-width="2.5"/>
  <line x1="320" y1="218" x2="310" y2="238" stroke="#cc5544" stroke-width="2.5"/>
  <line x1="320" y1="218" x2="330" y2="238" stroke="#cc5544" stroke-width="2.5"/>
  <!-- Arm pointing at person -->
  <line x1="306" y1="192" x2="130" y2="162" stroke="#cc5544" stroke-width="2" marker-end="url(#redArr)"/>
  <defs>
    <marker id="redArr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#cc5544"/>
    </marker>
  </defs>
  <!-- Attack bubble -->
  <rect x="198" y="86" width="110" height="36" rx="8" fill="#441111"/>
  <polygon points="290,122 310,132 296,122" fill="#441111"/>
  <text x="253" y="101" text-anchor="middle" font-size="9" fill="#ff7766" font-family="sans-serif">You can't trust</text>
  <text x="253" y="114" text-anchor="middle" font-size="9" fill="#ff7766" font-family="sans-serif">HIM — he's a liar!</text>
  <!-- X over argument -->
  <line x1="215" y1="136" x2="250" y2="168" stroke="#cc5544" stroke-width="2" opacity="0.7"/>
  <line x1="250" y1="136" x2="215" y2="168" stroke="#cc5544" stroke-width="2" opacity="0.7"/>
  <!-- Labels -->
  <text x="90" y="250" text-anchor="middle" font-size="10" fill="#7799bb" font-family="sans-serif">SPEAKER</text>
  <text x="320" y="250" text-anchor="middle" font-size="10" fill="#cc5544" font-family="sans-serif">ATTACKER</text>
  <text x="200" y="270" text-anchor="middle" font-size="10" fill="#886644" font-family="sans-serif">attacks person, ignores argument</text>
  <!-- Title -->
  <text x="200" y="38" text-anchor="middle" font-size="13" fill="#cc6644" font-family="sans-serif" letter-spacing="1">AD HOMINEM</text>
  <text x="200" y="58" text-anchor="middle" font-size="10" fill="#554433" font-family="sans-serif">rhetorical fallacy</text>
</svg>
