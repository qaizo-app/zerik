<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Original topic bubble -->
  <ellipse cx="80" cy="120" rx="55" ry="35" fill="#1e3a5f" stroke="#4a90d9" stroke-width="2"/>
  <text x="80" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#87ceeb" font-weight="bold">Исходный</text>
  <text x="80" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#87ceeb" font-weight="bold">вопрос</text>
  <!-- Arrow going straight (desired) - faded -->
  <path d="M135 120 L190 120" stroke="#4a90d9" stroke-width="2" opacity="0.3" stroke-dasharray="5,4" marker-end="url(#arrd)"/>
  <defs>
    <marker id="arrd" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a90d9" opacity="0.3"/>
    </marker>
    <marker id="arrr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e85d5d"/>
    </marker>
  </defs>
  <!-- Redirect arrow going to irrelevant topic -->
  <path d="M135 115 Q200 95 240 60" stroke="#e85d5d" stroke-width="3" fill="none" marker-end="url(#arrr)"/>
  <!-- Red herring icon -->
  <g transform="translate(250, 48) rotate(-30)">
    <!-- Fish body -->
    <ellipse cx="0" cy="0" rx="28" ry="12" fill="#c0392b"/>
    <!-- Fish tail -->
    <path d="M25 -8 L38 -16 L38 16 L25 8 Z" fill="#c0392b"/>
    <!-- Eye -->
    <circle cx="-14" cy="-3" r="3" fill="#ff8080"/>
    <circle cx="-14" cy="-3" r="1.5" fill="#1a1a2e"/>
    <!-- Scales -->
    <path d="M-5 -8 Q5 0 -5 8" stroke="#ff8080" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M5 -10 Q15 0 5 10" stroke="#ff8080" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  <text x="270" y="28" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d">Красная селёдка</text>
  <!-- Irrelevant topic bubble -->
  <ellipse cx="310" cy="120" rx="70" ry="40" fill="#3a1a1a" stroke="#e85d5d" stroke-width="2"/>
  <text x="310" y="112" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f0a0a0">Нерелевантная</text>
  <text x="310" y="127" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f0a0a0">тема</text>
  <text x="310" y="142" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d">(важная, но не по теме)</text>
  <!-- X mark over original direction -->
  <g stroke="#e85d5d" stroke-width="3" opacity="0.6">
    <line x1="190" y1="108" x2="202" y2="120"/>
    <line x1="202" y1="108" x2="190" y2="120"/>
  </g>
  <!-- Example -->
  <rect x="20" y="190" width="360" height="85" fill="#0d1530" rx="8"/>
  <text x="200" y="210" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">Вопрос: «Почему задержка проекта?»</text>
  <text x="200" y="228" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e85d5d">↳ Ответ: «Мы создали рекордное число рабочих мест»</text>
  <line x1="40" y1="238" x2="360" y2="238" stroke="#333" stroke-width="1"/>
  <text x="200" y="255" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">Оба факта могут быть верными.</text>
  <text x="200" y="268" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">Проблема — смена предмета без признания этого.</text>
</svg>
