<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f0f1a"/>
  <!-- Fork in road -->
  <line x1="200" y1="260" x2="200" y2="180" stroke="#445566" stroke-width="28" stroke-linecap="round"/>
  <!-- Left path (chosen) -->
  <line x1="200" y1="185" x2="90" y2="90" stroke="#4caf8a" stroke-width="18" stroke-linecap="round"/>
  <!-- Right path (unchosen) -->
  <line x1="200" y1="185" x2="310" y2="90" stroke="#334455" stroke-width="18" stroke-linecap="round" opacity="0.5"/>
  <!-- Person figure -->
  <circle cx="200" cy="248" r="10" fill="#aabbcc"/>
  <line x1="200" y1="258" x2="200" y2="278" stroke="#aabbcc" stroke-width="3"/>
  <line x1="190" y1="265" x2="210" y2="265" stroke="#aabbcc" stroke-width="2.5"/>
  <line x1="200" y1="278" x2="193" y2="290" stroke="#aabbcc" stroke-width="2.5"/>
  <line x1="200" y1="278" x2="207" y2="290" stroke="#aabbcc" stroke-width="2.5"/>
  <!-- Chosen destination -->
  <circle cx="90" cy="76" r="18" fill="#4caf8a" opacity="0.9"/>
  <text x="90" y="81" text-anchor="middle" font-size="16" fill="#fff" font-family="sans-serif">✓</text>
  <!-- Unchosen destination - ghost -->
  <circle cx="310" cy="76" r="18" fill="#334455" opacity="0.5"/>
  <text x="310" y="82" text-anchor="middle" font-size="18" fill="#6688aa" font-family="sans-serif">?</text>
  <!-- Labels -->
  <text x="58" y="108" text-anchor="middle" font-size="10" fill="#4caf8a" font-family="sans-serif">CHOSEN</text>
  <text x="342" y="108" text-anchor="middle" font-size="10" fill="#557799" font-family="sans-serif" opacity="0.8">FOREGONE</text>
  <!-- Cost arrow -->
  <text x="200" y="38" text-anchor="middle" font-size="12" fill="#cc8844" font-family="sans-serif">opportunity cost</text>
  <line x1="290" y1="45" x2="318" y2="62" stroke="#cc8844" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#cc8844"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" font-size="13" fill="#667788" font-family="sans-serif" letter-spacing="1">OPPORTUNITY COST</text>
</svg>
