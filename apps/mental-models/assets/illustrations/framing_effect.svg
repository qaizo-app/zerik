<svg viewBox="0 0 400 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="280" fill="#14100C"/>
  <!-- Left glass: "half full" frame -->
  <rect x="70" y="80" width="100" height="120" rx="6" fill="#251D15" stroke="#E89647" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Water fill (half) -->
  <rect x="71" y="140" width="98" height="59" rx="0" fill="#E89647" fill-opacity="0.2"/>
  <rect x="71" y="139" width="98" height="2" fill="#E89647" fill-opacity="0.5"/>
  <!-- Left label -->
  <text x="120" y="230" text-anchor="middle" font-family="monospace" font-size="9" fill="#E89647" fill-opacity="0.9">90% выживает</text>
  <text x="120" y="243" text-anchor="middle" font-family="monospace" font-size="8" fill="#9A8F7E" fill-opacity="0.7">«безопасная» рамка</text>
  <!-- Right glass: "half empty" frame (same glass, different frame color) -->
  <rect x="230" y="80" width="100" height="120" rx="6" fill="#251D15" stroke="#E89647" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Same water fill -->
  <rect x="231" y="140" width="98" height="59" rx="0" fill="#E89647" fill-opacity="0.2"/>
  <rect x="231" y="139" width="98" height="2" fill="#E89647" fill-opacity="0.5"/>
  <!-- Right label -->
  <text x="280" y="230" text-anchor="middle" font-family="monospace" font-size="9" fill="#E89647" fill-opacity="0.9">10% погибает</text>
  <text x="280" y="243" text-anchor="middle" font-family="monospace" font-size="8" fill="#9A8F7E" fill-opacity="0.7">«опасная» рамка</text>
  <!-- Frames around each glass (different colors) -->
  <rect x="62" y="72" width="116" height="136" rx="4" fill="none" stroke="#8DA66E" stroke-width="2" stroke-opacity="0.6"/>
  <rect x="222" y="72" width="116" height="136" rx="4" fill="none" stroke="#C4614F" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Equals sign between them -->
  <text x="200" y="138" text-anchor="middle" font-family="monospace" font-size="22" fill="#6B6258" fill-opacity="0.8">=</text>
  <!-- Top labels for frames -->
  <text x="120" y="65" text-anchor="middle" font-family="monospace" font-size="8" fill="#8DA66E" fill-opacity="0.8">GAIN FRAME</text>
  <text x="280" y="65" text-anchor="middle" font-family="monospace" font-size="8" fill="#C4614F" fill-opacity="0.8">LOSS FRAME</text>
</svg>
