<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Central high-degree node -->
  <circle cx="200" cy="140" r="18" fill="#e85d5d" stroke="#ff8080" stroke-width="2"/>
  <text x="200" y="144" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">10</text>
  <!-- Peripheral nodes with few connections -->
  <circle cx="100" cy="80" r="10" fill="#4a90d9" stroke="#6ab0f5" stroke-width="1.5"/>
  <text x="100" y="84" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">2</text>
  <circle cx="300" cy="80" r="10" fill="#4a90d9" stroke="#6ab0f5" stroke-width="1.5"/>
  <text x="300" y="84" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">3</text>
  <circle cx="60" cy="170" r="10" fill="#4a90d9" stroke="#6ab0f5" stroke-width="1.5"/>
  <text x="60" y="174" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">2</text>
  <circle cx="340" cy="170" r="10" fill="#4a90d9" stroke="#6ab0f5" stroke-width="1.5"/>
  <text x="340" y="174" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">2</text>
  <circle cx="130" cy="220" r="10" fill="#4a90d9" stroke="#6ab0f5" stroke-width="1.5"/>
  <text x="130" y="224" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">1</text>
  <circle cx="270" cy="220" r="10" fill="#4a90d9" stroke="#6ab0f5" stroke-width="1.5"/>
  <text x="270" y="224" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">1</text>
  <circle cx="150" cy="55" r="10" fill="#4a90d9" stroke="#6ab0f5" stroke-width="1.5"/>
  <text x="150" y="59" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">2</text>
  <circle cx="250" cy="55" r="10" fill="#4a90d9" stroke="#6ab0f5" stroke-width="1.5"/>
  <text x="250" y="59" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">1</text>
  <circle cx="75" cy="115" r="10" fill="#4a90d9" stroke="#6ab0f5" stroke-width="1.5"/>
  <text x="75" y="119" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">2</text>
  <circle cx="325" cy="115" r="10" fill="#4a90d9" stroke="#6ab0f5" stroke-width="1.5"/>
  <text x="325" y="119" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">1</text>
  <!-- Edges from center to all peripheral -->
  <g stroke="#e85d5d" stroke-width="1.5" opacity="0.6">
    <line x1="200" y1="140" x2="100" y2="80"/>
    <line x1="200" y1="140" x2="300" y2="80"/>
    <line x1="200" y1="140" x2="60" y2="170"/>
    <line x1="200" y1="140" x2="340" y2="170"/>
    <line x1="200" y1="140" x2="130" y2="220"/>
    <line x1="200" y1="140" x2="270" y2="220"/>
    <line x1="200" y1="140" x2="150" y2="55"/>
    <line x1="200" y1="140" x2="250" y2="55"/>
    <line x1="200" y1="140" x2="75" y2="115"/>
    <line x1="200" y1="140" x2="325" y2="115"/>
  </g>
  <!-- Some peripheral-to-peripheral edges -->
  <g stroke="#4a90d9" stroke-width="1" opacity="0.4">
    <line x1="100" y1="80" x2="150" y2="55"/>
    <line x1="300" y1="80" x2="250" y2="55"/>
    <line x1="60" y1="170" x2="75" y2="115"/>
    <line x1="340" y1="170" x2="325" y2="115"/>
  </g>
  <!-- Labels -->
  <text x="200" y="168" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d">Популярный узел</text>
  <text x="200" y="180" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">появляется у всех в списке</text>
  <!-- Stat annotation -->
  <rect x="10" y="255" width="380" height="30" fill="#0d0d1f" rx="5"/>
  <text x="200" y="268" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8e8e8">Число в кружке = количество друзей этого узла</text>
  <text x="200" y="280" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">Ваши друзья в среднем имеют больше друзей, чем вы</text>
</svg>
