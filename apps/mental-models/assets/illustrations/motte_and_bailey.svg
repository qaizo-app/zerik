<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Bailey (large courtyard, left-center) -->
  <ellipse cx="160" cy="195" rx="110" ry="55" fill="#2a1a1a" stroke="#e85d5d" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="160" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e85d5d" font-weight="bold">BAILEY</text>
  <text x="160" y="215" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f08080">Смелая, спорная позиция</text>
  <!-- Motte (small fortified hill, right) -->
  <ellipse cx="295" cy="155" rx="65" ry="40" fill="#1a2a3a" stroke="#4a90d9" stroke-width="2.5"/>
  <!-- Tower on motte -->
  <rect x="278" y="100" width="34" height="45" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1.5"/>
  <rect x="274" y="95" width="42" height="12" fill="#2a4a6f"/>
  <!-- Battlements -->
  <g fill="#2a4a6f" stroke="#4a90d9" stroke-width="1">
    <rect x="274" y="86" width="8" height="10"/>
    <rect x="286" y="86" width="8" height="10"/>
    <rect x="298" y="86" width="8" height="10"/>
    <rect x="310" y="86" width="8" height="10"/>
  </g>
  <!-- Flag -->
  <line x1="292" y1="86" x2="292" y2="65" stroke="#888" stroke-width="1.5"/>
  <polygon points="292,65 308,73 292,81" fill="#4a90d9" opacity="0.8"/>
  <text x="295" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#87ceeb" font-weight="bold">MOTTE</text>
  <text x="295" y="182" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87ceeb">Банальная, бесспорная</text>
  <!-- Person moving between positions -->
  <circle cx="215" cy="185" r="8" fill="#e8c89c"/>
  <rect x="210" y="193" width="10" height="14" rx="2" fill="#9b59b6"/>
  <!-- Arrows showing the tactic -->
  <path d="M200 185 L250 165" stroke="#e8c44a" stroke-width="2" marker-end="url(#a)"/>
  <text x="225" y="168" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e8c44a">атака→</text>
  <path d="M250 178 L200 195" stroke="#4adf8a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#b)"/>
  <text x="225" y="196" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4adf8a">←безопасно</text>
  <!-- Top labels -->
  <text x="200" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e8c44a" font-weight="bold">Тактика двух позиций</text>
  <!-- Example box -->
  <rect x="20" y="240" width="360" height="48" fill="#0d1530" rx="8"/>
  <text x="200" y="258" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8c44a">Bailey: «Наука — просто одна из форм знания»</text>
  <text x="200" y="274" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">Motte: «Учёные тоже могут ошибаться» ← под давлением</text>
  <!-- Attack arrow to bailey -->
  <path d="M30 195 L50 195" stroke="#e85d5d" stroke-width="2" marker-end="url(#c)"/>
  <text x="22" y="190" font-family="sans-serif" font-size="8" fill="#e85d5d">критик</text>
</svg>
