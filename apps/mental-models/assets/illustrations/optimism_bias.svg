<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Two thermometer bars: self vs others -->
  <rect x="80" y="60" width="50" height="180" rx="25" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
  <rect x="270" y="60" width="50" height="180" rx="25" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
  <!-- Self fill - high optimism -->
  <rect x="80" y="90" width="50" height="150" rx="0" fill="#f7d060" opacity="0.9"/>
  <rect x="80" y="68" width="50" height="22" rx="22" fill="#f7d060"/>
  <!-- Others fill - lower -->
  <rect x="270" y="155" width="50" height="85" rx="0" fill="#6c8ebf" opacity="0.8"/>
  <rect x="270" y="215" width="50" height="25" rx="22" fill="#6c8ebf" opacity="0.8"/>
  <!-- Labels -->
  <text x="105" y="270" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="13" font-weight="bold">Я</text>
  <text x="295" y="270" text-anchor="middle" fill="#6c8ebf" font-family="sans-serif" font-size="13" font-weight="bold">Другие</text>
  <!-- Upward arrow over self -->
  <line x1="105" y1="50" x2="105" y2="30" stroke="#f7d060" stroke-width="3" stroke-linecap="round"/>
  <polygon points="105,20 99,34 111,34" fill="#f7d060"/>
  <!-- Happy sun icon -->
  <circle cx="105" cy="148" r="16" fill="#1a1a2e"/>
  <text x="105" y="154" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="20">☀</text>
  <!-- Divider line -->
  <line x1="190" y1="80" x2="190" y2="240" stroke="#3a3a5a" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="105" y="40" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Успех</text>
  <text x="295" y="40" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Успех</text>
</svg>
