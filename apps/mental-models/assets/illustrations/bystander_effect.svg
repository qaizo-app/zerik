<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Central collapsed person -->
  <ellipse cx="200" cy="185" rx="28" ry="12" fill="#cc4444" opacity="0.8"/>
  <circle cx="200" cy="165" r="14" fill="#cc4444" opacity="0.8"/>
  <text x="200" y="210" text-anchor="middle" fill="#cc4444" font-family="sans-serif" font-size="9">упал</text>
  <!-- Bystanders in a ring around, looking at each other -->
  <circle cx="115" cy="100" r="16" fill="#5a5a7a" opacity="0.8"/>
  <circle cx="200" cy="80" r="16" fill="#5a5a7a" opacity="0.8"/>
  <circle cx="285" cy="100" r="16" fill="#5a5a7a" opacity="0.8"/>
  <circle cx="320" cy="170" r="16" fill="#5a5a7a" opacity="0.8"/>
  <circle cx="285" cy="240" r="16" fill="#5a5a7a" opacity="0.8"/>
  <circle cx="115" cy="240" r="16" fill="#5a5a7a" opacity="0.8"/>
  <circle cx="80" cy="170" r="16" fill="#5a5a7a" opacity="0.8"/>
  <!-- Arrows showing they look at each other, not the victim -->
  <line x1="131" y1="100" x2="184" y2="88" stroke="#aaaacc" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="284" y1="107" x2="216" y2="88" stroke="#aaaacc" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="318" y1="155" x2="299" y2="114" stroke="#aaaacc" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- "Someone else will do it" thought bubble -->
  <ellipse cx="335" cy="115" rx="45" ry="22" fill="#2a2a4a" stroke="#6c6c8c" stroke-width="1" opacity="0.9"/>
  <text x="335" y="110" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="9">кто-нибудь</text>
  <text x="335" y="123" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="9">поможет...</text>
  <!-- Nobody moves indicator -->
  <text x="200" y="265" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="11">Больше свидетелей → меньше вероятность помощи</text>
</svg>
