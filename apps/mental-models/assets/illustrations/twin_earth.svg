<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Earth (left planet) -->
  <circle cx="105" cy="115" r="55" fill="#1a3a5a" stroke="#4a90d9" stroke-width="2"/>
  <!-- Land masses -->
  <ellipse cx="95" cy="100" rx="18" ry="12" fill="#2d5a2d" opacity="0.8"/>
  <ellipse cx="115" cy="120" rx="12" ry="8" fill="#2d5a2d" opacity="0.8"/>
  <ellipse cx="88" cy="125" rx="10" ry="6" fill="#2d5a2d" opacity="0.7"/>
  <text x="105" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#87ceeb" font-weight="bold">Земля</text>
  <!-- H2O molecule label -->
  <rect x="55" y="178" width="100" height="22" fill="#1e3a5f" rx="4" stroke="#4a90d9" stroke-width="1"/>
  <text x="105" y="193" text-anchor="middle" font-family="monospace" font-size="12" fill="#4adf8a" font-weight="bold">H₂O</text>
  <!-- Water droplets Earth -->
  <ellipse cx="78" cy="112" rx="7" ry="4" fill="#4a90d9" opacity="0.7"/>
  <ellipse cx="118" cy="106" rx="6" ry="3.5" fill="#4a90d9" opacity="0.7"/>
  <!-- Person on Earth -->
  <circle cx="105" cy="70" r="7" fill="#e8a87c"/>
  <rect x="100" y="78" width="10" height="14" rx="2" fill="#c8783c"/>
  <text x="105" y="64" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aaa">«вода»</text>
  <!-- Speech bubble -->
  <ellipse cx="105" cy="53" rx="18" ry="9" fill="#2a2a4a" stroke="#4a90d9" stroke-width="1"/>
  <text x="105" y="57" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#87ceeb">«вода»</text>
  <!-- Twin Earth (right planet) -->
  <circle cx="295" cy="115" r="55" fill="#2a1a3a" stroke="#9b59b6" stroke-width="2"/>
  <!-- Different colored land -->
  <ellipse cx="285" cy="100" rx="18" ry="12" fill="#4a1a5a" opacity="0.8"/>
  <ellipse cx="305" cy="120" rx="12" ry="8" fill="#4a1a5a" opacity="0.8"/>
  <ellipse cx="278" cy="125" rx="10" ry="6" fill="#4a1a5a" opacity="0.7"/>
  <text x="295" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c39bd3" font-weight="bold">Земля-близнец</text>
  <!-- XYZ molecule label -->
  <rect x="245" y="178" width="100" height="22" fill="#2a1a3a" rx="4" stroke="#9b59b6" stroke-width="1"/>
  <text x="295" y="193" text-anchor="middle" font-family="monospace" font-size="12" fill="#e85d5d" font-weight="bold">XYZ</text>
  <!-- Water droplets Twin Earth (different color) -->
  <ellipse cx="268" cy="112" rx="7" ry="4" fill="#9b59b6" opacity="0.7"/>
  <ellipse cx="308" cy="106" rx="6" ry="3.5" fill="#9b59b6" opacity="0.7"/>
  <!-- Person on Twin Earth -->
  <circle cx="295" cy="70" r="7" fill="#e8a87c"/>
  <rect x="290" y="78" width="10" height="14" rx="2" fill="#9b59b6"/>
  <!-- Speech bubble -->
  <ellipse cx="295" cy="53" rx="18" ry="9" fill="#2a1a3a" stroke="#9b59b6" stroke-width="1"/>
  <text x="295" y="57" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#c39bd3">«вода»</text>
  <!-- Same word, different substance arrow -->
  <text x="200" y="40" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e8c44a">Одно слово — разные вещества</text>
  <!-- Question mark center -->
  <text x="200" y="125" text-anchor="middle" font-family="sans-serif" font-size="40" fill="#e8c44a" opacity="0.3" font-weight="bold">≠</text>
  <!-- Putnam principle -->
  <rect x="20" y="222" width="360" height="60" fill="#0d1530" rx="8"/>
  <text x="200" y="242" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8c44a" font-weight="bold">Тезис Патнэма</text>
  <text x="200" y="258" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">«Значения не находятся в голове»</text>
  <text x="200" y="274" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">Смысл слова частично определяется реальным миром</text>
</svg>
