<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Path/road -->
  <rect x="0" y="170" width="400" height="40" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <line x1="0" y1="190" x2="400" y2="190" stroke="#555" stroke-width="1" stroke-dasharray="20,10"/>
  <!-- Person in need (center) -->
  <ellipse cx="200" cy="185" rx="22" ry="12" fill="#2a2a3a" stroke="#888" stroke-width="1"/>
  <circle cx="200" cy="174" r="8" fill="#c8a87c"/>
  <text x="200" y="205" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#888">человеку плохо</text>

  <!-- NOT hurrying person (left) - stops -->
  <circle cx="80" cy="155" r="12" fill="#c8a87c"/>
  <rect x="73" y="167" width="14" height="20" rx="3" fill="#4a90d9"/>
  <!-- Stopping arrow -->
  <path d="M92 165 L150 178" stroke="#4adf8a" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="115" y="162" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4adf8a" font-weight="bold">останавливается</text>
  <!-- Clock: lots of time -->
  <circle cx="50" cy="125" r="14" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1.5"/>
  <line x1="50" y1="125" x2="50" y2="115" stroke="#4adf8a" stroke-width="2"/>
  <line x1="50" y1="125" x2="57" y2="130" stroke="#4adf8a" stroke-width="2"/>
  <text x="50" y="110" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4adf8a">+время</text>
  <!-- Stat -->
  <rect x="20" y="215" width="145" height="38" fill="#1a2a1a" rx="4" stroke="#4adf8a" stroke-width="1"/>
  <text x="92" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4adf8a" font-weight="bold">63%</text>
  <text x="92" y="245" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#87ceeb">не спешащих помогли</text>

  <!-- Hurrying person (right) - passes by -->
  <circle cx="320" cy="148" r="12" fill="#c8a87c"/>
  <rect x="313" y="160" width="14" height="20" rx="3" fill="#e85d5d"/>
  <!-- Speed lines -->
  <g stroke="#e85d5d" stroke-width="1.5" opacity="0.6">
    <line x1="293" y1="148" x2="308" y2="148"/>
    <line x1="295" y1="155" x2="310" y2="155"/>
    <line x1="297" y1="141" x2="311" y2="141"/>
  </g>
  <!-- Passing arrow (dashed, skips person in need) -->
  <path d="M248 185 L305 168" stroke="#e85d5d" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="285" y="162" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d" font-weight="bold">проходит мимо</text>
  <!-- Clock: rushing -->
  <circle cx="355" cy="120" r="14" fill="#3a1a1a" stroke="#e85d5d" stroke-width="1.5"/>
  <line x1="355" y1="120" x2="355" y2="108" stroke="#e85d5d" stroke-width="2"/>
  <line x1="355" y1="120" x2="363" y2="126" stroke="#e85d5d" stroke-width="2"/>
  <text x="355" y="106" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e85d5d">спешит!</text>
  <!-- Stat -->
  <rect x="235" y="215" width="145" height="38" fill="#2a1a1a" rx="4" stroke="#e85d5d" stroke-width="1"/>
  <text x="307" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e85d5d" font-weight="bold">10%</text>
  <text x="307" y="245" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#f08080">спешащих помогли</text>

  <!-- Topic of sermon: NO effect note -->
  <rect x="130" y="30" width="140" height="50" fill="#0d1530" rx="6" stroke="#555" stroke-width="1"/>
  <text x="200" y="48" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">Тема проповеди</text>
  <text x="200" y="62" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e8c44a">«добрый самаритянин»</text>
  <text x="200" y="74" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#888">→ не повлияла на результат</text>

  <!-- Bottom note -->
  <text x="200" y="268" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aaa">Дарли и Батсон · Принстон · 1973</text>
</svg>
