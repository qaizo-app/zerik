<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Timeline arrow -->
  <line x1="40" y1="155" x2="360" y2="155" stroke="#555" stroke-width="2"/>
  <polygon points="360,150 370,155 360,160" fill="#555"/>
  <text x="40" y="175" font-family="sans-serif" font-size="9" fill="#888">30 лет</text>
  <text x="340" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">80 лет</text>
  <!-- Person at 30 -->
  <circle cx="80" cy="130" r="14" fill="#c8a87c"/>
  <rect x="70" y="144" width="20" height="28" rx="4" fill="#4a90d9"/>
  <!-- Decision fork -->
  <path d="M95 143 L140 110" stroke="#4adf8a" stroke-width="2"/>
  <path d="M95 143 L140 180" stroke="#e85d5d" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Path A: try -->
  <text x="150" y="107" font-family="sans-serif" font-size="9" fill="#4adf8a">Попробую</text>
  <!-- Path B: don't try -->
  <text x="150" y="187" font-family="sans-serif" font-size="9" fill="#e85d5d">Не рискну</text>
  <!-- Person at 80 - path A: happy -->
  <circle cx="300" cy="108" r="14" fill="#c8a87c"/>
  <rect x="290" y="122" width="20" height="22" rx="4" fill="#4adf8a" opacity="0.7"/>
  <!-- Cane -->
  <line x1="312" y1="132" x2="320" y2="150" stroke="#888" stroke-width="2"/>
  <!-- Happy thought -->
  <ellipse cx="265" cy="88" rx="28" ry="14" fill="#1a2a1a" stroke="#4adf8a" stroke-width="1.5"/>
  <text x="265" y="85" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4adf8a">Я попробовал.</text>
  <text x="265" y="96" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4adf8a">Без сожаления.</text>
  <!-- Person at 80 - path B: regret -->
  <circle cx="300" cy="195" r="14" fill="#c8a87c"/>
  <rect x="290" y="209" width="20" height="22" rx="4" fill="#888" opacity="0.7"/>
  <!-- Regret thought -->
  <ellipse cx="265" cy="215" rx="30" ry="14" fill="#2a1a1a" stroke="#e85d5d" stroke-width="1.5"/>
  <text x="265" y="212" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e85d5d">Зачем я</text>
  <text x="265" y="223" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e85d5d">не попробовал?</text>
  <!-- Amazon logo hint -->
  <rect x="155" y="60" width="90" height="36" fill="#0d1530" rx="6" stroke="#e8c44a" stroke-width="1"/>
  <text x="200" y="77" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e8c44a">Безос, 1994:</text>
  <text x="200" y="90" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#aaa">уволился → Amazon</text>
  <!-- Bottom principle -->
  <rect x="20" y="248" width="360" height="38" fill="#0d1530" rx="8"/>
  <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8c44a" font-weight="bold">Минимизируй не риск — минимизируй сожаление</text>
  <text x="200" y="279" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">Тест 80 лет: буду ли я жалеть, что не попробовал?</text>
</svg>
