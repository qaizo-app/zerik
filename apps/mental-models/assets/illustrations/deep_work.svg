<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Deep work zone: left side, focused -->
  <rect x="20" y="40" width="170" height="195" fill="#0d1530" stroke="#4a90d9" stroke-width="2" rx="8"/>
  <text x="105" y="62" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4a90d9" font-weight="bold">ГЛУБОКАЯ РАБОТА</text>
  <!-- Focused person at desk -->
  <rect x="60" y="100" width="90" height="55" fill="#1e3a5f" rx="4"/>
  <!-- Monitor -->
  <rect x="70" y="108" width="70" height="40" fill="#0a1525" stroke="#4a90d9" stroke-width="1" rx="2"/>
  <!-- Code on monitor -->
  <g font-family="monospace" font-size="6" fill="#4adf8a">
    <text x="74" y="120">def solve(problem):</text>
    <text x="74" y="130">  analysis = deep_</text>
    <text x="74" y="140">  return insight</text>
  </g>
  <!-- Person head above desk -->
  <circle cx="105" cy="92" r="10" fill="#c8a87c"/>
  <!-- Concentration zone marks -->
  <circle cx="105" cy="92" r="22" fill="none" stroke="#4a90d9" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <circle cx="105" cy="92" r="34" fill="none" stroke="#4a90d9" stroke-width="1" stroke-dasharray="3,5" opacity="0.25"/>
  <!-- Timer block: 90 min -->
  <rect x="55" y="167" width="100" height="30" fill="#1e3a5f" rx="4"/>
  <text x="105" y="187" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e8c44a" font-weight="bold">90 мин — 0 отвлечений</text>
  <!-- Output value -->
  <text x="105" y="220" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4adf8a">Ценный результат</text>
  <!-- Divider barrier -->
  <rect x="196" y="40" width="8" height="195" fill="#333" rx="2"/>
  <text x="200" y="152" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555" writing-mode="tb" transform="rotate(90, 200, 152)">БАРЬЕР</text>
  <!-- Shallow work zone: right side, fragmented -->
  <rect x="210" y="40" width="170" height="195" fill="#1a0d0d" stroke="#e85d5d" stroke-width="2" rx="8"/>
  <text x="295" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e85d5d" font-weight="bold">ПОВЕРХНОСТНАЯ</text>
  <!-- Distracted person -->
  <circle cx="295" cy="90" r="10" fill="#c8a87c"/>
  <!-- Multiple interruption bubbles -->
  <g fill="#2a1a1a" stroke="#e85d5d" stroke-width="1.5">
    <ellipse cx="248" cy="72" rx="22" ry="12"/>
    <ellipse cx="295" cy="55" rx="22" ry="12"/>
    <ellipse cx="342" cy="72" rx="22" ry="12"/>
    <ellipse cx="260" cy="112" rx="22" ry="12"/>
    <ellipse cx="330" cy="112" rx="22" ry="12"/>
  </g>
  <g font-family="sans-serif" font-size="8" fill="#e85d5d" text-anchor="middle">
    <text x="248" y="75">Slack</text>
    <text x="295" y="58">E-mail</text>
    <text x="342" y="75">Встреча</text>
    <text x="260" y="115">Звонок</text>
    <text x="330" y="115">Уведомление</text>
  </g>
  <!-- Fragmented timeline -->
  <rect x="225" y="137" width="140" height="16" fill="#2a1a1a" rx="3"/>
  <g fill="#e85d5d" opacity="0.7">
    <rect x="226" y="138" width="22" height="14" rx="2"/>
    <rect x="256" y="138" width="12" height="14" rx="2"/>
    <rect x="276" y="138" width="18" height="14" rx="2"/>
    <rect x="302" y="138" width="8" height="14" rx="2"/>
    <rect x="318" y="138" width="25" height="14" rx="2"/>
    <rect x="351" y="138" width="13" height="14" rx="2"/>
  </g>
  <text x="295" y="168" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#888">~23 мин на восстановление после каждого</text>
  <text x="295" y="220" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d">Заняты, но не продуктивны</text>
  <!-- Bottom stat -->
  <rect x="20" y="248" width="360" height="30" fill="#0d1530" rx="6"/>
  <text x="200" y="268" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8e8e8">Глубокая работа становится редкой — и всё более ценной</text>
</svg>
