<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Cage structure -->
  <rect x="120" y="70" width="160" height="160" rx="8" fill="none" stroke="#4a4a7a" stroke-width="2.5"/>
  <!-- Cage bars -->
  <line x1="155" y1="70" x2="155" y2="230" stroke="#4a4a7a" stroke-width="1.5"/>
  <line x1="200" y1="70" x2="200" y2="230" stroke="#4a4a7a" stroke-width="1.5"/>
  <line x1="245" y1="70" x2="245" y2="230" stroke="#4a4a7a" stroke-width="1.5"/>
  <line x1="120" y1="110" x2="280" y2="110" stroke="#4a4a7a" stroke-width="1.5"/>
  <line x1="120" y1="150" x2="280" y2="150" stroke="#4a4a7a" stroke-width="1.5"/>
  <line x1="120" y1="190" x2="280" y2="190" stroke="#4a4a7a" stroke-width="1.5"/>
  <!-- Open door (right side) -->
  <rect x="270" y="150" width="10" height="80" rx="2" fill="#1a1a2e"/>
  <text x="290" y="200" fill="#4a9a4a" font-family="sans-serif" font-size="20">→</text>
  <!-- Person inside, lying down (passive) -->
  <ellipse cx="200" cy="175" rx="30" ry="14" fill="#6c8ebf" opacity="0.8"/>
  <circle cx="200" cy="158" r="13" fill="#6c8ebf" opacity="0.8"/>
  <!-- Sad face -->
  <circle cx="195" cy="156" r="2" fill="#1a1a2e"/>
  <circle cx="205" cy="156" r="2" fill="#1a1a2e"/>
  <path d="M193 163 Q200 159 207 163" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
  <!-- Arrow to freedom they're not taking -->
  <line x1="230" y1="185" x2="280" y2="185" stroke="#4a9a4a" stroke-width="2" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Labels -->
  <text x="200" y="45" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Дверь открыта — но попытки прекратились</text>
  <text x="200" y="265" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Беспомощность — не черта характера. Её учат.</text>
</svg>
