<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f0f1a"/>
  <!-- Bobo doll (inflatable clown) center -->
  <!-- Clown body - round bottom (inflated) -->
  <ellipse cx="200" cy="220" rx="38" ry="42" fill="#e8442a" opacity="0.9"/>
  <!-- Clown head -->
  <circle cx="200" cy="158" r="32" fill="#f5d5b0"/>
  <!-- Clown hat -->
  <polygon points="200,120 185,143 215,143" fill="#cc2200"/>
  <circle cx="200" cy="118" r="5" fill="#ffcc00"/>
  <!-- Clown nose -->
  <circle cx="200" cy="163" r="7" fill="#ff3300"/>
  <!-- Clown smile -->
  <path d="M187,173 Q200,183 213,173" fill="none" stroke="#cc4400" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Clown eyes -->
  <circle cx="190" cy="156" r="5" fill="#fff"/>
  <circle cx="210" cy="156" r="5" fill="#fff"/>
  <circle cx="190" cy="156" r="2.5" fill="#223355"/>
  <circle cx="210" cy="156" r="2.5" fill="#223355"/>
  <!-- Clown tie / collar -->
  <ellipse cx="200" cy="190" rx="14" ry="8" fill="#ffcc00"/>
  <!-- ADULT figure (left) - aggressive pose -->
  <circle cx="82" cy="145" r="18" fill="#cc7744"/>
  <line x1="82" y1="163" x2="82" y2="200" stroke="#cc7744" stroke-width="4"/>
  <line x1="64" y1="176" x2="82" y2="165" stroke="#cc7744" stroke-width="3.5"/>
  <!-- Arm raised with fist toward clown -->
  <line x1="100" y1="165" x2="162" y2="180" stroke="#cc7744" stroke-width="3.5"/>
  <circle cx="165" cy="181" r="8" fill="#cc7744"/>
  <!-- Legs -->
  <line x1="82" y1="200" x2="72" y2="224" stroke="#cc7744" stroke-width="3.5"/>
  <line x1="82" y1="200" x2="92" y2="224" stroke="#cc7744" stroke-width="3.5"/>
  <!-- CHILD figure (right) - mirroring the gesture -->
  <circle cx="320" cy="162" r="14" fill="#ffcc88"/>
  <line x1="320" y1="176" x2="320" y2="208" stroke="#ffcc88" stroke-width="3.5"/>
  <line x1="308" y1="188" x2="320" y2="178" stroke="#ffcc88" stroke-width="3"/>
  <!-- Child arm also raised toward clown -->
  <line x1="332" y1="178" x2="244" y2="190" stroke="#ffcc88" stroke-width="3"/>
  <circle cx="241" cy="191" r="6" fill="#ffcc88"/>
  <!-- Child legs -->
  <line x1="320" y1="208" x2="312" y2="228" stroke="#ffcc88" stroke-width="3"/>
  <line x1="320" y1="208" x2="328" y2="228" stroke="#ffcc88" stroke-width="3"/>
  <!-- Arrow showing observational learning -->
  <path d="M105,145 Q168,120 245,152" fill="none" stroke="#886644" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrBrown5)"/>
  <defs>
    <marker id="arrBrown5" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#886644"/>
    </marker>
  </defs>
  <text x="176" y="120" text-anchor="middle" font-size="9" fill="#886644" font-family="sans-serif">observes</text>
  <!-- Labels -->
  <text x="82" y="238" text-anchor="middle" font-size="10" fill="#cc7744" font-family="sans-serif">ADULT</text>
  <text x="82" y="252" text-anchor="middle" font-size="9" fill="#884433" font-family="sans-serif">(model)</text>
  <text x="320" y="242" text-anchor="middle" font-size="10" fill="#ffcc88" font-family="sans-serif">CHILD</text>
  <text x="320" y="256" text-anchor="middle" font-size="9" fill="#aa8844" font-family="sans-serif">(copies)</text>
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-size="13" fill="#cc7744" font-family="sans-serif" letter-spacing="1">BOBO DOLL EXPERIMENT</text>
  <text x="200" y="48" text-anchor="middle" font-size="10" fill="#554433" font-family="sans-serif">Bandura · Stanford · 1961 · observational learning</text>
  <text x="200" y="275" text-anchor="middle" font-size="10" fill="#886644" font-family="sans-serif">we learn what goes unpunished</text>
</svg>
