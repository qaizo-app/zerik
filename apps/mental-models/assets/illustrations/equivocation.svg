<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Central word bubble -->
  <ellipse cx="200" cy="150" rx="55" ry="35" fill="#2a2a4a" stroke="#f7d060" stroke-width="2"/>
  <text x="200" y="145" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="18" font-weight="bold">ЗАКОН</text>
  <text x="200" y="163" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">одно слово</text>
  <!-- Left meaning cloud -->
  <ellipse cx="80" cy="90" rx="65" ry="38" fill="#2a3a4a" stroke="#6c8ebf" stroke-width="1.5" opacity="0.9"/>
  <text x="80" y="84" text-anchor="middle" fill="#6c8ebf" font-family="sans-serif" font-size="11" font-weight="bold">Закон природы</text>
  <text x="80" y="100" text-anchor="middle" fill="#8888aa" font-family="sans-serif" font-size="10">«сильный выживает»</text>
  <!-- Right meaning cloud -->
  <ellipse cx="320" cy="90" rx="65" ry="38" fill="#3a2a4a" stroke="#cc6b8e" stroke-width="1.5" opacity="0.9"/>
  <text x="320" y="84" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="11" font-weight="bold">Закон государства</text>
  <text x="320" y="100" text-anchor="middle" fill="#8888aa" font-family="sans-serif" font-size="10">«правовые нормы»</text>
  <!-- Arrows from word to meanings -->
  <line x1="150" y1="135" x2="118" y2="115" stroke="#f7d060" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="250" y1="135" x2="282" y2="115" stroke="#f7d060" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Invalid conclusion below -->
  <rect x="100" y="215" width="200" height="42" rx="8" fill="#3a1a1a" stroke="#cc4444" stroke-width="1.5"/>
  <text x="200" y="232" text-anchor="middle" fill="#cc4444" font-family="sans-serif" font-size="11" font-weight="bold">∴ Значит, законы должны</text>
  <text x="200" y="248" text-anchor="middle" fill="#cc4444" font-family="sans-serif" font-size="11">позволять доминировать сильным</text>
  <!-- Error X -->
  <text x="95" y="240" text-anchor="middle" fill="#cc4444" font-family="sans-serif" font-size="20" font-weight="bold">✕</text>
  <!-- Arrows down to conclusion -->
  <line x1="200" y1="185" x2="200" y2="215" stroke="#6c6c8c" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
