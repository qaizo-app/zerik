<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Stock 1 (top left) -->
  <rect x="40" y="60" width="80" height="50" fill="#1e3a5f" stroke="#4a90d9" stroke-width="2" rx="4"/>
  <text x="80" y="82" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#87ceeb" font-weight="bold">Запас A</text>
  <text x="80" y="98" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87ceeb">деньги / ресурс</text>
  <!-- Stock 2 (top right) -->
  <rect x="280" y="60" width="80" height="50" fill="#1e3a5f" stroke="#4a90d9" stroke-width="2" rx="4"/>
  <text x="320" y="82" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#87ceeb" font-weight="bold">Запас B</text>
  <text x="320" y="98" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87ceeb">население / капитал</text>
  <!-- Flow A→B (top arrow) -->
  <defs>
    <marker id="af" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e8c44a"/>
    </marker>
    <marker id="af2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4adf8a"/>
    </marker>
    <marker id="af3" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#e85d5d"/>
    </marker>
  </defs>
  <line x1="122" y1="85" x2="278" y2="85" stroke="#e8c44a" stroke-width="2.5" marker-end="url(#af)"/>
  <rect x="170" y="70" width="60" height="20" fill="#2a2a4a" rx="3"/>
  <text x="200" y="84" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e8c44a">поток →</text>
  <!-- Reinforcing feedback loop (bottom arc) -->
  <path d="M120 105 Q200 190 280 105" stroke="#4adf8a" stroke-width="2" fill="none" marker-end="url(#af2)"/>
  <text x="200" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4adf8a" font-weight="bold">+ Усиливающая</text>
  <text x="200" y="188" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4adf8a">петля обратной связи</text>
  <text x="200" y="200" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4adf8a">(снежный ком)</text>
  <!-- Balancing feedback -->
  <path d="M280 110 Q350 160 310 200 Q270 225 200 215 Q130 225 90 200 Q40 165 120 110" stroke="#e85d5d" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#af3)"/>
  <text x="360" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d">− Балансирующая</text>
  <text x="360" y="188" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d">петля (термостат)</text>
  <!-- Legend -->
  <rect x="20" y="240" width="360" height="45" fill="#0d1530" rx="6"/>
  <text x="200" y="258" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8e8e8" font-weight="bold">Структура системы = Запасы + Потоки + Обратная связь</text>
  <text x="200" y="275" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">Поведение определяется структурой, а не намерениями</text>
</svg>
