<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Timeline horizontal -->
  <line x1="40" y1="200" x2="370" y2="200" stroke="#4a4a7a" stroke-width="2"/>
  <!-- Past label -->
  <text x="50" y="220" fill="#6c6c8c" font-family="sans-serif" font-size="10">Прошлое</text>
  <text x="320" y="220" fill="#6c6c8c" font-family="sans-serif" font-size="10">Будущее</text>
  <!-- "Now" marker -->
  <line x1="200" y1="185" x2="200" y2="215" stroke="#aaaacc" stroke-width="2"/>
  <text x="200" y="230" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="10">Сейчас</text>
  <!-- Old book - long history, long future -->
  <rect x="55" y="100" width="100" height="100" rx="4" fill="#f7d060" opacity="0.15"/>
  <line x1="55" y1="200" x2="155" y2="200" stroke="#f7d060" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <text x="105" y="115" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="20">📚</text>
  <text x="105" y="135" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="9">100 лет</text>
  <!-- Future arrow for book -->
  <line x1="200" y1="155" x2="350" y2="155" stroke="#f7d060" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="350,155 338,149 338,161" fill="#f7d060"/>
  <text x="275" y="148" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="9">ещё 100 лет?</text>
  <!-- New startup - short history, short future -->
  <line x1="175" y1="200" x2="200" y2="200" stroke="#cc6b8e" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <text x="188" y="175" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="16">🚀</text>
  <text x="188" y="190" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="9">6 мес.</text>
  <!-- Short future for startup -->
  <line x1="200" y1="180" x2="240" y2="180" stroke="#cc6b8e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="235" y="173" fill="#cc6b8e" font-family="sans-serif" font-size="9">✕</text>
  <!-- Wheel icon -->
  <text x="105" y="165" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="18">⚙️</text>
  <text x="105" y="180" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="8">тысячи лет</text>
  <text x="200" y="265" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Дольше прожило → дольше проживёт</text>
</svg>
