<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#050510"/>
  <!-- Stars scattered -->
  <circle cx="30" cy="25" r="1.2" fill="#fff" opacity="0.6"/>
  <circle cx="75" cy="15" r="0.8" fill="#fff" opacity="0.5"/>
  <circle cx="130" cy="30" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="180" cy="12" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="250" cy="22" r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="310" cy="18" r="0.9" fill="#fff" opacity="0.5"/>
  <circle cx="370" cy="35" r="1.4" fill="#fff" opacity="0.6"/>
  <circle cx="55" cy="70" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="140" cy="55" r="1.1" fill="#fff" opacity="0.6"/>
  <circle cx="290" cy="60" r="0.8" fill="#fff" opacity="0.5"/>
  <circle cx="350" cy="80" r="1.3" fill="#fff" opacity="0.7"/>
  <circle cx="20" cy="120" r="0.9" fill="#fff" opacity="0.4"/>
  <circle cx="380" cy="100" r="0.8" fill="#fff" opacity="0.5"/>
  <circle cx="60" cy="200" r="1.0" fill="#fff" opacity="0.3"/>
  <circle cx="330" cy="150" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="390" cy="200" r="1.1" fill="#fff" opacity="0.5"/>
  <circle cx="15" cy="250" r="0.9" fill="#fff" opacity="0.3"/>
  <circle cx="370" cy="260" r="1.2" fill="#fff" opacity="0.4"/>
  <!-- Distant galaxies as faint patches -->
  <ellipse cx="320" cy="50" rx="12" ry="6" fill="#334466" opacity="0.4" transform="rotate(-30,320,50)"/>
  <ellipse cx="60" cy="140" rx="10" ry="5" fill="#334466" opacity="0.3" transform="rotate(20,60,140)"/>
  <!-- Earth / Source of signal -->
  <circle cx="200" cy="180" r="20" fill="#1a3a5c"/>
  <circle cx="200" cy="180" r="20" fill="none" stroke="#2255aa" stroke-width="2"/>
  <!-- Continents simplified -->
  <ellipse cx="196" cy="175" rx="7" ry="9" fill="#2a6a3a" opacity="0.8"/>
  <ellipse cx="208" cy="184" rx="5" ry="6" fill="#2a6a3a" opacity="0.7"/>
  <!-- Radio waves going out -->
  <circle cx="200" cy="180" r="35" fill="none" stroke="#4499cc" stroke-width="1.5" opacity="0.7" stroke-dasharray="5,4"/>
  <circle cx="200" cy="180" r="60" fill="none" stroke="#4499cc" stroke-width="1" opacity="0.4" stroke-dasharray="5,6"/>
  <circle cx="200" cy="180" r="92" fill="none" stroke="#4499cc" stroke-width="0.8" opacity="0.2" stroke-dasharray="5,8"/>
  <!-- Silence indicator - empty space with question marks at stars -->
  <text x="130" y="72" text-anchor="middle" font-size="11" fill="#cc4444" font-family="sans-serif" opacity="0.6">?</text>
  <text x="310" y="88" text-anchor="middle" font-size="11" fill="#cc4444" font-family="sans-serif" opacity="0.6">?</text>
  <text x="55" y="165" text-anchor="middle" font-size="11" fill="#cc4444" font-family="sans-serif" opacity="0.5">?</text>
  <text x="355" y="148" text-anchor="middle" font-size="11" fill="#cc4444" font-family="sans-serif" opacity="0.5">?</text>
  <!-- Title -->
  <text x="200" y="240" text-anchor="middle" font-size="13" fill="#4488bb" font-family="sans-serif" letter-spacing="1">FERMI PARADOX</text>
  <text x="200" y="258" text-anchor="middle" font-size="10" fill="#223355" font-family="sans-serif">where is everybody?</text>
  <!-- Silence label -->
  <text x="200" y="282" text-anchor="middle" font-size="10" fill="#cc4444" font-family="sans-serif" letter-spacing="3" opacity="0.7">· · · SILENCE · · ·</text>
</svg>
