<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Small sample box left -->
  <rect x="30" y="80" width="100" height="100" rx="8" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
  <text x="80" y="68" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">Выборка (3)</text>
  <!-- 3 dots: 1 red, 2 blue -->
  <circle cx="55" cy="125" r="14" fill="#cc4444" opacity="0.9"/>
  <circle cx="95" cy="108" r="14" fill="#4488cc" opacity="0.8"/>
  <circle cx="95" cy="148" r="14" fill="#4488cc" opacity="0.8"/>
  <!-- Large arrow to conclusion -->
  <path d="M130 130 L195 130" stroke="#f7d060" stroke-width="3" marker-end="url(#arrowh)"/>
  <defs>
    <marker id="arrowh" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#f7d060"/>
    </marker>
  </defs>
  <text x="163" y="120" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="11">поэтому</text>
  <!-- Conclusion box right: large population all red -->
  <rect x="200" y="55" width="170" height="160" rx="8" fill="#2a2a4a" stroke="#cc4444" stroke-width="1.5"/>
  <text x="285" y="43" text-anchor="middle" fill="#cc4444" font-family="sans-serif" font-size="11">«Все красные» (1000)</text>
  <!-- Many red dots -->
  <circle cx="225" cy="90" r="8" fill="#cc4444" opacity="0.7"/>
  <circle cx="250" cy="90" r="8" fill="#cc4444" opacity="0.7"/>
  <circle cx="275" cy="90" r="8" fill="#cc4444" opacity="0.7"/>
  <circle cx="300" cy="90" r="8" fill="#cc4444" opacity="0.7"/>
  <circle cx="325" cy="90" r="8" fill="#cc4444" opacity="0.7"/>
  <circle cx="350" cy="90" r="8" fill="#cc4444" opacity="0.7"/>
  <circle cx="225" cy="115" r="8" fill="#cc4444" opacity="0.7"/>
  <circle cx="250" cy="115" r="8" fill="#cc4444" opacity="0.7"/>
  <circle cx="275" cy="115" r="8" fill="#cc4444" opacity="0.7"/>
  <circle cx="300" cy="115" r="8" fill="#cc4444" opacity="0.7"/>
  <circle cx="325" cy="115" r="8" fill="#cc4444" opacity="0.7"/>
  <circle cx="350" cy="115" r="8" fill="#cc4444" opacity="0.7"/>
  <!-- Error X -->
  <text x="285" y="185" text-anchor="middle" fill="#cc4444" font-family="sans-serif" font-size="28" font-weight="bold">✕</text>
  <text x="200" y="265" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">3 случая ≠ данные о тысяче</text>
</svg>
