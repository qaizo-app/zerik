<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="#FFFBEB"/>

  <!-- Seabed / ground -->
  <rect x="0" y="255" width="400" height="45" fill="#E5E7EB" rx="0"/>

  <!-- Anchor chain going down from figure to anchor -->
  <path d="M200 218 Q195 230 192 245 Q190 255 188 265" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 4"/>

  <!-- Anchor -->
  <circle cx="185" cy="272" r="14" fill="#6B7280" opacity="0.25"/>
  <!-- Anchor symbol -->
  <line x1="185" y1="260" x2="185" y2="284" stroke="#374151" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="174" y1="267" x2="196" y2="267" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <path d="M174 267 Q165 278 172 283" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M196 267 Q205 278 198 283" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="185" cy="260" r="4" fill="#374151"/>

  <!-- Standing figure (being pulled down by anchor) -->
  <circle cx="200" cy="185" r="14" fill="#374151"/>
  <line x1="200" y1="199" x2="200" y2="230" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <!-- Left arm reaching toward the right (toward change arrow) -->
  <line x1="200" y1="210" x2="228" y2="202" stroke="#374151" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right arm pulled downward -->
  <line x1="200" y1="210" x2="185" y2="225" stroke="#374151" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="193" y1="230" x2="185" y2="250" stroke="#374151" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="207" y1="230" x2="215" y2="250" stroke="#374151" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Arrow pointing right (towards change) — attractive but unreached -->
  <line x1="248" y1="210" x2="310" y2="210" stroke="#10B981" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="310,202 326,210 310,218" fill="#10B981"/>

  <!-- "Изменение" label on right -->
  <text x="338" y="214" font-family="Georgia, serif" font-size="11" fill="#065F46" font-style="italic">Перемены</text>

  <!-- Current state label / badge on figure -->
  <rect x="60" y="175" width="100" height="24" rx="5" fill="#FDE68A" opacity="0.9"/>
  <text x="110" y="191" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#92400E">Как было всегда</text>

  <!-- Arrow from badge to figure -->
  <line x1="160" y1="187" x2="185" y2="190" stroke="#92400E" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>

  <!-- Small comfort zone circle around figure -->
  <circle cx="200" cy="210" r="52" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <text x="200" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#B45309" opacity="0.7" font-style="italic">зона комфорта</text>
</svg>
