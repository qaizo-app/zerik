<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Predictor entity (top) -->
  <ellipse cx="200" cy="55" rx="45" ry="28" fill="#2a1a4a" stroke="#9b59b6" stroke-width="2"/>
  <text x="200" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c39bd3" font-weight="bold">ОМЕГА</text>
  <text x="200" y="65" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#9b59b6">Почти идеальный предиктор</text>
  <!-- Scan beams from predictor to boxes -->
  <line x1="165" y1="80" x2="120" y2="140" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="235" y1="80" x2="280" y2="140" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- Box A (transparent, always has $1000) -->
  <rect x="70" y="140" width="100" height="70" fill="#1e3a1e" stroke="#4adf8a" stroke-width="2" rx="4"/>
  <text x="120" y="162" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4adf8a" font-weight="bold">Коробка А</text>
  <text x="120" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e8c44a" font-weight="bold">$1 000</text>
  <text x="120" y="198" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4adf8a">всегда видна</text>
  <!-- Box B (opaque) -->
  <rect x="230" y="140" width="100" height="70" fill="#1a1a3a" stroke="#e85d5d" stroke-width="2" rx="4"/>
  <text x="280" y="162" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e85d5d" font-weight="bold">Коробка Б</text>
  <text x="280" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c0c0c0">$1 000 000</text>
  <text x="280" y="196" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e85d5d">или $0</text>
  <!-- Question mark overlay on Box B -->
  <text x="280" y="185" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#e85d5d" opacity="0.3" font-weight="bold">?</text>
  <!-- Two strategies -->
  <rect x="20" y="230" width="170" height="55" fill="#1e2a1e" stroke="#4adf8a" stroke-width="1.5" rx="6"/>
  <text x="105" y="248" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4adf8a" font-weight="bold">Брать только Б</text>
  <text x="105" y="262" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aaa">Ожидаемая ценность:</text>
  <text x="105" y="276" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e8c44a">~$1 000 000</text>
  <rect x="210" y="230" width="170" height="55" fill="#2a1e1e" stroke="#e85d5d" stroke-width="1.5" rx="6"/>
  <text x="295" y="248" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d" font-weight="bold">Брать обе</text>
  <text x="295" y="262" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#aaa">Доминирующая стратегия:</text>
  <text x="295" y="276" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d">всегда лучше логически</text>
</svg>
