<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Path from left -->
  <path d="M30 180 L145 180" stroke="#aaaacc" stroke-width="3" stroke-linecap="round"/>
  <!-- Large boulder/obstacle -->
  <ellipse cx="200" cy="175" rx="55" ry="45" fill="#3a3a5a" stroke="#6c6c8c" stroke-width="2.5"/>
  <text x="200" y="182" text-anchor="middle" fill="#6c6c8c" font-family="sans-serif" font-size="13" font-weight="bold">ПРЕПЯТСТВИЕ</text>
  <!-- Path through the rock (transformed) -->
  <path d="M250 155 Q295 120 340 100" stroke="#f7d060" stroke-width="3" stroke-linecap="round" fill="none"/>
  <polygon points="340,100 328,108 335,118" fill="#f7d060"/>
  <!-- Small figure on top of rock -->
  <circle cx="200" cy="132" r="14" fill="#f7d060"/>
  <rect x="187" y="146" width="26" height="30" rx="6" fill="#f7d060"/>
  <!-- Upward arrow from figure -->
  <line x1="200" y1="118" x2="200" y2="98" stroke="#4a9a4a" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="200,90 194,103 206,103" fill="#4a9a4a"/>
  <!-- "Via obstacle" label -->
  <text x="300" y="95" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="10">через препятствие</text>
  <!-- Stoic quote -->
  <text x="200" y="240" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="11">«Препятствие на пути становится путём»</text>
  <text x="200" y="257" text-anchor="middle" fill="#6c6c8c" font-family="sans-serif" font-size="10">— Марк Аврелий</text>
  <!-- Amor fati symbol -->
  <text x="50" y="155" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="11">amor fati</text>
</svg>
