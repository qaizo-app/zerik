<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f0f1a"/>
  <!-- Table -->
  <rect x="60" y="195" width="280" height="14" rx="4" fill="#3a2a18"/>
  <rect x="90" y="209" width="12" height="50" rx="3" fill="#2a1e10"/>
  <rect x="298" y="209" width="12" height="50" rx="3" fill="#2a1e10"/>
  <!-- Plate 1: 1 marshmallow (now) -->
  <ellipse cx="130" cy="196" rx="40" ry="8" fill="#2a2040" stroke="#335577" stroke-width="1"/>
  <rect x="110" y="170" width="40" height="26" rx="8" fill="#eeeeff"/>
  <rect x="110" y="170" width="40" height="5" rx="3" fill="#ddddff" opacity="0.7"/>
  <text x="130" y="215" text-anchor="middle" font-size="10" fill="#6688aa" font-family="sans-serif">now</text>
  <!-- Plate 2: 2 marshmallows (later) -->
  <ellipse cx="270" cy="196" rx="48" ry="8" fill="#2a2040" stroke="#335577" stroke-width="1" opacity="0.6"/>
  <rect x="240" y="170" width="38" height="26" rx="8" fill="#eeeeff" opacity="0.5"/>
  <rect x="283" y="172" width="36" height="24" rx="8" fill="#eeeeff" opacity="0.5"/>
  <rect x="240" y="170" width="38" height="5" rx="3" fill="#ddddff" opacity="0.3"/>
  <rect x="283" y="172" width="36" height="5" rx="3" fill="#ddddff" opacity="0.3"/>
  <text x="270" y="215" text-anchor="middle" font-size="10" fill="#6688aa" font-family="sans-serif">wait 15 min</text>
  <!-- Clock in center -->
  <circle cx="200" cy="140" r="28" fill="#111128" stroke="#446688" stroke-width="2"/>
  <line x1="200" y1="140" x2="200" y2="120" stroke="#aaccee" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="140" x2="214" y2="148" stroke="#cc8844" stroke-width="2" stroke-linecap="round"/>
  <circle cx="200" cy="140" r="3" fill="#aaccee"/>
  <!-- Child figure -->
  <circle cx="130" cy="120" r="16" fill="#cc9966"/>
  <line x1="130" y1="136" x2="130" y2="168" stroke="#cc9966" stroke-width="3.5"/>
  <line x1="115" y1="150" x2="145" y2="150" stroke="#cc9966" stroke-width="2.5"/>
  <line x1="130" y1="168" x2="120" y2="188" stroke="#cc9966" stroke-width="2.5"/>
  <line x1="130" y1="168" x2="140" y2="188" stroke="#cc9966" stroke-width="2.5"/>
  <!-- Eyes looking at marshmallow with longing -->
  <circle cx="125" cy="118" r="4" fill="#553322"/>
  <circle cx="135" cy="118" r="4" fill="#553322"/>
  <!-- Arrow: now vs later choice -->
  <path d="M162,178 Q200,162 238,178" fill="none" stroke="#886644" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="200" y="175" text-anchor="middle" font-size="9" fill="#886644" font-family="sans-serif">or</text>
  <!-- Labels -->
  <text x="130" y="250" text-anchor="middle" font-size="11" fill="#eeeeff" font-family="sans-serif">×1</text>
  <text x="270" y="250" text-anchor="middle" font-size="11" fill="#eeeeff" font-family="sans-serif">×2</text>
  <!-- Title -->
  <text x="200" y="32" text-anchor="middle" font-size="13" fill="#aa8866" font-family="sans-serif" letter-spacing="1">THE MARSHMALLOW TEST</text>
  <text x="200" y="50" text-anchor="middle" font-size="10" fill="#554433" font-family="sans-serif">Mischel · 1968 · delayed gratification</text>
  <!-- Nuance note -->
  <text x="200" y="272" text-anchor="middle" font-size="9" fill="#446688" font-family="sans-serif">2018: environmental factors matter more than willpower</text>
</svg>
