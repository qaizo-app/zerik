<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background — warm dark -->
  <rect width="400" height="300" fill="#1C1917"/>

  <!-- Hourglass outer frame -->
  <path d="M145 30 L255 30 L255 40 L210 140 L255 240 L255 270 L145 270 L145 240 L190 140 L145 40 Z"
        stroke="#D6D3D1" stroke-width="2.5" fill="none" opacity="0.7"/>

  <!-- Top frame cap -->
  <rect x="138" y="24" width="124" height="16" rx="4" fill="#57534E" opacity="0.8"/>
  <!-- Bottom frame cap -->
  <rect x="138" y="260" width="124" height="16" rx="4" fill="#57534E" opacity="0.8"/>

  <!-- Sand in the top (depleting) — triangle shape -->
  <path d="M150 40 L250 40 L207 125 L193 125 Z" fill="#D97706" opacity="0.45"/>

  <!-- Sand falling — thin stream -->
  <line x1="200" y1="125" x2="200" y2="152" stroke="#D97706" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <!-- Falling particles -->
  <circle cx="200" cy="134" r="2" fill="#F59E0B" opacity="0.9"/>
  <circle cx="199" cy="143" r="1.5" fill="#F59E0B" opacity="0.7"/>
  <circle cx="201" cy="148" r="1" fill="#F59E0B" opacity="0.5"/>

  <!-- Sand in the bottom (accumulating) — inverted triangle -->
  <path d="M193 158 L207 158 L240 240 L160 240 Z" fill="#D97706" opacity="0.6"/>

  <!-- Gleam on glass -->
  <line x1="155" y1="50" x2="175" y2="90" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="155" y1="230" x2="175" y2="210" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.18"/>

  <!-- Latin text above -->
  <text x="200" y="16" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#A8A29E" font-style="italic" letter-spacing="3">MEMENTO MORI</text>

  <!-- Subtle quote below -->
  <text x="200" y="292" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#78716C" font-style="italic">Помни, что смертен</text>
</svg>
