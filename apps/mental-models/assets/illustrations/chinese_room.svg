<svg viewBox="0 0 400 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="280" fill="#0F0C16"/>
  <!-- The box/room -->
  <rect x="120" y="70" width="160" height="150" rx="4" fill="#1A1424" stroke="#A78BFA" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Input slot (left) -->
  <rect x="108" y="155" width="14" height="20" rx="2" fill="#221A2E" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.7"/>
  <!-- Output slot (right) -->
  <rect x="278" y="155" width="14" height="20" rx="2" fill="#221A2E" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.7"/>
  <!-- Person inside (simple silhouette) -->
  <ellipse cx="200" cy="130" rx="12" ry="12" fill="#221A2E" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.6"/>
  <rect x="190" y="143" width="20" height="35" rx="3" fill="#221A2E" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.6"/>
  <!-- Book/rules in hand -->
  <rect x="172" y="155" width="18" height="14" rx="2" fill="#2A2238" stroke="#A78BFA" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Chinese characters incoming (left) -->
  <text x="42" y="162" font-family="monospace" font-size="16" fill="#A78BFA" fill-opacity="0.7">中</text>
  <text x="68" y="162" font-family="monospace" font-size="16" fill="#A78BFA" fill-opacity="0.5">文</text>
  <!-- Arrow into input slot -->
  <line x1="90" y1="165" x2="107" y2="165" stroke="#A78BFA" stroke-width="1.5" stroke-opacity="0.6"/>
  <polygon points="103,161 110,165 103,169" fill="#A78BFA" fill-opacity="0.6"/>
  <!-- Arrow out of output slot -->
  <line x1="293" y1="165" x2="315" y2="165" stroke="#A78BFA" stroke-width="1.5" stroke-opacity="0.6"/>
  <polygon points="312,161 322,165 312,169" fill="#A78BFA" fill-opacity="0.6"/>
  <!-- Output characters (same script, person doesn't understand) -->
  <text x="324" y="162" font-family="monospace" font-size="14" fill="#A78BFA" fill-opacity="0.7">好</text>
  <text x="344" y="162" font-family="monospace" font-size="14" fill="#A78BFA" fill-opacity="0.5">的</text>
  <!-- "Rulebook" label inside -->
  <text x="200" y="240" text-anchor="middle" font-family="monospace" font-size="8" fill="#6B6478" fill-opacity="0.8">книга правил</text>
  <!-- Labels above slots -->
  <text x="50" y="148" text-anchor="middle" font-family="monospace" font-size="7" fill="#A78BFA" fill-opacity="0.5">ввод</text>
  <text x="350" y="148" text-anchor="middle" font-family="monospace" font-size="7" fill="#A78BFA" fill-opacity="0.5">вывод</text>
  <!-- "понимает?" label -->
  <text x="200" y="258" text-anchor="middle" font-family="monospace" font-size="9" fill="#A78BFA" fill-opacity="0.35">понимает ли?</text>
</svg>
