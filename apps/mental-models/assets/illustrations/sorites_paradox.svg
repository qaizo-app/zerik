  <circle cx="249" cy="198" r="4" fill="#6366F1" fill-opacity="0.65"/>
  <circle cx="225" cy="186" r="4" fill="#6366F1" fill-opacity="0.6"/>
  <circle cx="237" cy="186" r="4" fill="#6366F1" fill-opacity="0.6"/>
