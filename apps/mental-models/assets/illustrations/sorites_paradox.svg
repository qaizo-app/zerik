  <circle cx="298" cy="198" r="4" fill="#6366F1" fill-opacity="0.8"/>
  <circle cx="310" cy="198" r="4" fill="#6366F1" fill-opacity="0.8"/>
  <circle cx="322" cy="198" r="4" fill="#6366F1" fill-opacity="0.8"/>
  <circle cx="334" cy="198" r="4" fill="#6366F1" fill-opacity="0.8"/>
  <circle cx="298" cy="186" r="4" fill="#6366F1" fill-opacity="0.75"/>
  <circle cx="310" cy="186" r="4" fill="#6366F1" fill-opacity="0.75"/>
