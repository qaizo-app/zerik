<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Swamp background -->
  <ellipse cx="200" cy="240" rx="170" ry="35" fill="#1a2a1a" opacity="0.7"/>
  <!-- Lightning bolt -->
  <polygon points="190,30 175,100 195,100 180,175 215,85 192,85 210,30" fill="#f7d060" opacity="0.9"/>
  <!-- Original person (left, fading) -->
  <circle cx="100" cy="170" r="20" fill="#6c8ebf" opacity="0.3"/>
  <rect x="85" y="192" width="30" height="40" rx="7" fill="#6c8ebf" opacity="0.3"/>
  <text x="100" y="245" text-anchor="middle" fill="#6c8ebf" font-family="sans-serif" font-size="10" opacity="0.5">Оригинал</text>
  <text x="100" y="258" text-anchor="middle" fill="#6c8ebf" font-family="sans-serif" font-size="10" opacity="0.5">(погибает)</text>
  <!-- Swampman rising (right) - identical outside -->
  <circle cx="310" cy="170" r="20" fill="#4a7a4a" opacity="0.9"/>
  <rect x="295" y="192" width="30" height="40" rx="7" fill="#4a7a4a" opacity="0.9"/>
  <text x="310" y="245" text-anchor="middle" fill="#4a9a4a" font-family="sans-serif" font-size="10">Болотный</text>
  <text x="310" y="258" text-anchor="middle" fill="#4a9a4a" font-family="sans-serif" font-size="10">человек</text>
  <!-- Question mark between them -->
  <text x="205" y="175" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="38" font-weight="bold">?</text>
  <!-- "Same?" label -->
  <text x="205" y="215" text-anchor="middle" fill="#cc6b8e" font-family="sans-serif" font-size="11">Тот же человек?</text>
  <!-- Causal history indicator: original has chain, swampman doesn't -->
  <text x="100" y="130" text-anchor="middle" fill="#6c8ebf" font-family="sans-serif" font-size="9" opacity="0.6">история опыта</text>
  <line x1="100" y1="135" x2="100" y2="148" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="310" y="130" text-anchor="middle" fill="#cc4444" font-family="sans-serif" font-size="9">без истории</text>
  <line x1="310" y1="135" x2="310" y2="148" stroke="#cc4444" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
  <text x="200" y="275" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="10">Идентичность — это история, которая тебя создала</text>
</svg>
