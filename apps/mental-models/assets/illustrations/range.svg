<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Wide arc (generalist) -->
  <path d="M50 220 Q200 60 350 220" stroke="#f7d060" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Domain icons along the arc -->
  <circle cx="85" cy="185" r="22" fill="#2a2a4a" stroke="#f7d060" stroke-width="1.5"/>
  <text x="85" y="191" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="16">🎨</text>
  <circle cx="148" cy="128" r="22" fill="#2a2a4a" stroke="#f7d060" stroke-width="1.5"/>
  <text x="148" y="134" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="16">🔬</text>
  <circle cx="200" cy="108" r="22" fill="#2a2a4a" stroke="#f7d060" stroke-width="1.5"/>
  <text x="200" y="114" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="16">📖</text>
  <circle cx="252" cy="128" r="22" fill="#2a2a4a" stroke="#f7d060" stroke-width="1.5"/>
  <text x="252" y="134" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="16">⚽</text>
  <circle cx="315" cy="185" r="22" fill="#2a2a4a" stroke="#f7d060" stroke-width="1.5"/>
  <text x="315" y="191" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="16">🎵</text>
  <!-- Narrow specialist bar (right small) -->
  <rect x="370" y="100" width="18" height="140" rx="4" fill="#6c8ebf" opacity="0.7"/>
  <text x="379" y="92" text-anchor="middle" fill="#6c8ebf" font-family="sans-serif" font-size="10">узко</text>
  <!-- Labels -->
  <text x="200" y="255" text-anchor="middle" fill="#f7d060" font-family="sans-serif" font-size="12" font-weight="bold">Широкий диапазон</text>
  <text x="200" y="272" text-anchor="middle" fill="#aaaacc" font-family="sans-serif" font-size="10">Federer vs Woods — в сложных доменах побеждает ширина</text>
</svg>
