<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Baby (Albert) -->
  <circle cx="80" cy="140" r="22" fill="#e8c89c"/>
  <rect x="62" y="162" width="36" height="28" rx="4" fill="#4a90d9" opacity="0.8"/>
  <!-- Happy face (before) -->
  <circle cx="73" cy="136" r="3" fill="#333"/>
  <circle cx="87" cy="136" r="3" fill="#333"/>
  <path d="M73 147 Q80 153 87 147" stroke="#555" stroke-width="2" fill="none"/>
  <!-- White rat -->
  <ellipse cx="185" cy="155" rx="28" ry="16" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
  <circle cx="210" cy="148" r="9" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
  <circle cx="214" cy="145" r="2" fill="#e85d5d"/>
  <path d="M218 152 Q230 145 225 158" stroke="#ccc" stroke-width="1.5" fill="none"/>
  <!-- Tail -->
  <path d="M157 158 Q145 165 155 175" stroke="#ccc" stroke-width="1.5" fill="none"/>
  <!-- Ears -->
  <ellipse cx="206" cy="140" rx="5" ry="7" fill="#e8c0c0"/>
  <ellipse cx="215" cy="140" rx="5" ry="7" fill="#e8c0c0"/>
  <!-- Arrow: neutral stimulus -->
  <text x="140" y="130" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">нейтральный</text>
  <!-- Steel bar + hammer on right -->
  <rect x="290" y="110" width="60" height="8" rx="2" fill="#888" stroke="#666" stroke-width="1"/>
  <rect x="315" y="80" width="10" height="35" fill="#c8a060" rx="2"/>
  <ellipse cx="320" cy="78" rx="14" ry="9" fill="#c8a060"/>
  <text x="320" y="138" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8c44a" font-weight="bold">УДАР!</text>
  <!-- Sound waves -->
  <g stroke="#e8c44a" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M285 114 Q275 107 275 121 Q275 135 285 128"/>
    <path d="M278 114 Q263 104 263 121 Q263 138 278 128"/>
    <path d="M271 114 Q251 101 251 121 Q251 141 271 128"/>
  </g>
  <!-- BANG label -->
  <text x="260" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#e85d5d" font-weight="bold" opacity="0.9">УК!</text>
  <!-- Arrow between stimuli -->
  <path d="M105 148 L155 155" stroke="#e8c44a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <!-- After conditioning: rat alone = fear -->
  <rect x="20" y="218" width="360" height="62" fill="#0d1530" rx="8"/>
  <text x="200" y="237" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8c44a" font-weight="bold">После 7 повторений</text>
  <text x="200" y="253" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">Крыса (без удара) → страх и плач</text>
  <text x="200" y="269" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">Кролик, собака, вата, маска Санты → тоже страх</text>
  <!-- Generalization note -->
  <text x="200" y="172" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4adf8a">Классическое обусловливание страха · Уотсон, 1920</text>
</svg>
