<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f0f1a"/>
  <!-- Machine (right side) -->
  <rect x="250" y="70" width="120" height="170" rx="10" fill="#1a1a30" stroke="#446688" stroke-width="2.5"/>
  <!-- Screen on machine -->
  <rect x="262" y="90" width="96" height="70" rx="5" fill="#0a0a20" stroke="#2244aa" stroke-width="1.5"/>
  <!-- Perfect life on screen -->
  <text x="310" y="112" text-anchor="middle" font-size="9" fill="#66ff99" font-family="sans-serif">perfect life</text>
  <text x="310" y="126" text-anchor="middle" font-size="16" font-family="sans-serif">🏆</text>
  <text x="310" y="142" text-anchor="middle" font-size="9" fill="#44cc88" font-family="sans-serif">all desires met</text>
  <!-- Buttons -->
  <circle cx="272" cy="180" r="7" fill="#cc2244"/>
  <circle cx="292" cy="180" r="7" fill="#228833"/>
  <circle cx="312" cy="180" r="7" fill="#cc8822"/>
  <circle cx="332" cy="180" r="7" fill="#2255cc"/>
  <!-- Machine label -->
  <text x="310" y="204" text-anchor="middle" font-size="9" fill="#446688" font-family="sans-serif">EXPERIENCE</text>
  <text x="310" y="216" text-anchor="middle" font-size="9" fill="#446688" font-family="sans-serif">MACHINE</text>
  <text x="310" y="230" text-anchor="middle" font-size="9" fill="#446688" font-family="sans-serif">Nozick · 1974</text>
  <!-- Person connected to machine -->
  <!-- Cable/electrode -->
  <path d="M196,130 Q230,110 262,115" fill="none" stroke="#446688" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="196" cy="130" r="5" fill="#4466aa"/>
  <!-- Person figure (left, plugged in, dreaming) -->
  <!-- Person lying down / reclining -->
  <rect x="60" y="170" width="140" height="20" rx="10" fill="#223344" stroke="#336688" stroke-width="1"/>
  <circle cx="180" cy="142" r="22" fill="#8899aa"/>
  <!-- Eyes closed - plugged in -->
  <line x1="172" y1="140" x2="180" y2="141" stroke="#334455" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="184" y1="141" x2="192" y2="140" stroke="#334455" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Dream bubble (unreal but perfect) -->
  <ellipse cx="120" cy="90" rx="50" ry="32" fill="#112233" stroke="#2255aa" stroke-width="1.5"/>
  <circle cx="148" cy="118" r="5" fill="#112233" stroke="#2255aa" stroke-width="1.5"/>
  <circle cx="156" cy="130" r="3.5" fill="#112233" stroke="#2255aa" stroke-width="1.5"/>
  <text x="120" y="84" text-anchor="middle" font-size="9" fill="#3366ff" font-family="sans-serif">SIMULATED</text>
  <text x="120" y="97" text-anchor="middle" font-size="14" font-family="sans-serif">🌟</text>
  <text x="120" y="113" text-anchor="middle" font-size="9" fill="#2255aa" font-family="sans-serif">feels real</text>
  <!-- Real world indicator (below) -->
  <text x="130" y="210" text-anchor="middle" font-size="9" fill="#664433" font-family="sans-serif">real body · real world</text>
  <!-- Question in center -->
  <text x="200" y="252" text-anchor="middle" font-size="11" fill="#886644" font-family="sans-serif">Would you plug in — forever?</text>
  <text x="200" y="268" text-anchor="middle" font-size="9" fill="#554433" font-family="sans-serif">hedonism vs. value of real experience</text>
  <!-- Title -->
  <text x="200" y="32" text-anchor="middle" font-size="13" fill="#5577aa" font-family="sans-serif" letter-spacing="1">THE EXPERIENCE MACHINE</text>
  <text x="200" y="50" text-anchor="middle" font-size="10" fill="#334455" font-family="sans-serif">Nozick · 1974 · against pure hedonism</text>
</svg>
