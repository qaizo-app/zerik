<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Scale beam -->
  <line x1="200" y1="80" x2="200" y2="130" stroke="#888" stroke-width="3"/>
  <circle cx="200" cy="75" r="6" fill="#666"/>
  <!-- Tilted beam (tilted left - toward negative) -->
  <line x1="80" y1="155" x2="320" y2="120" stroke="#aaa" stroke-width="4" stroke-linecap="round"/>
  <!-- Left pan (negative, lower - heavier) -->
  <line x1="80" y1="155" x2="80" y2="175" stroke="#888" stroke-width="2"/>
  <line x1="60" y1="155" x2="100" y2="155" stroke="#888" stroke-width="1.5"/>
  <ellipse cx="80" cy="175" rx="30" ry="8" fill="#1e1e3a" stroke="#e85d5d" stroke-width="1.5"/>
  <!-- One big negative weight -->
  <circle cx="80" cy="160" r="20" fill="#e85d5d" opacity="0.9"/>
  <text x="80" y="165" text-anchor="middle" font-family="sans-serif" font-size="18" fill="white" font-weight="bold">−</text>
  <!-- Right pan (positive, higher - lighter) -->
  <line x1="320" y1="120" x2="320" y2="145" stroke="#888" stroke-width="2"/>
  <line x1="300" y1="120" x2="340" y2="120" stroke="#888" stroke-width="1.5"/>
  <ellipse cx="320" cy="145" rx="35" ry="8" fill="#1e1e3a" stroke="#4adf8a" stroke-width="1.5"/>
  <!-- Five small positive weights -->
  <circle cx="297" cy="135" r="9" fill="#4adf8a" opacity="0.8"/>
  <text x="297" y="139" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">+</text>
  <circle cx="312" cy="133" r="9" fill="#4adf8a" opacity="0.8"/>
  <text x="312" y="137" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">+</text>
  <circle cx="327" cy="133" r="9" fill="#4adf8a" opacity="0.8"/>
  <text x="327" y="137" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">+</text>
  <circle cx="342" cy="133" r="9" fill="#4adf8a" opacity="0.8"/>
  <text x="342" y="137" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">+</text>
  <circle cx="307" cy="122" r="9" fill="#4adf8a" opacity="0.8"/>
  <text x="307" y="126" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" font-weight="bold">+</text>
  <!-- Labels -->
  <text x="80" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e85d5d" font-weight="bold">1 плохой отзыв</text>
  <text x="320" y="168" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4adf8a" font-weight="bold">5 хороших</text>
  <!-- Arrow showing tilt direction -->
  <path d="M200 80 L155 60" stroke="#e85d5d" stroke-width="2" marker-end="url(#arrn)" opacity="0.7"/>
  <defs>
    <marker id="arrn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e85d5d"/>
    </marker>
  </defs>
  <!-- Evolution note -->
  <rect x="20" y="225" width="360" height="60" fill="#0d1530" rx="6"/>
  <text x="200" y="244" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e8e8e8" font-weight="bold">Эволюционная логика</text>
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">Не заметить хищника = смерть</text>
  <text x="200" y="276" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">Не заметить ягоду = пропущенный обед</text>
</svg>
