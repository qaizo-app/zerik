<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- BEFORE: left network -->
  <text x="95" y="35" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#4adf8a" font-weight="bold">ДО</text>
  <!-- Nodes -->
  <circle cx="95" cy="58" r="10" fill="#1e3a5f" stroke="#4a90d9" stroke-width="2"/>
  <text x="95" y="62" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87ceeb">A</text>
  <circle cx="45" cy="140" r="10" fill="#1e3a5f" stroke="#4a90d9" stroke-width="2"/>
  <text x="45" y="144" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87ceeb">B</text>
  <circle cx="145" cy="140" r="10" fill="#1e3a5f" stroke="#4a90d9" stroke-width="2"/>
  <text x="145" y="144" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87ceeb">C</text>
  <circle cx="95" cy="220" r="10" fill="#1e3a5f" stroke="#4a90d9" stroke-width="2"/>
  <text x="95" y="224" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#87ceeb">D</text>
  <!-- Roads -->
  <line x1="95" y1="68" x2="50" y2="131" stroke="#4a90d9" stroke-width="3"/>
  <line x1="95" y1="68" x2="140" y2="131" stroke="#4a90d9" stroke-width="3"/>
  <line x1="50" y1="149" x2="90" y2="212" stroke="#4a90d9" stroke-width="3"/>
  <line x1="140" y1="149" x2="100" y2="212" stroke="#4a90d9" stroke-width="3"/>
  <!-- Labels -->
  <text x="58" y="103" text-anchor="middle" font-family="monospace" font-size="9" fill="#4adf8a">45мин</text>
  <text x="132" y="103" text-anchor="middle" font-family="monospace" font-size="9" fill="#4adf8a">45мин</text>
  <text x="58" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#4adf8a">45мин</text>
  <text x="132" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="#4adf8a">45мин</text>
  <!-- Total time -->
  <rect x="20" y="240" width="150" height="24" fill="#1a2a1a" rx="4" stroke="#4adf8a" stroke-width="1"/>
  <text x="95" y="256" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4adf8a" font-weight="bold">Итого: 90 мин</text>

  <!-- AFTER: right network with new road -->
  <text x="305" y="35" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e85d5d" font-weight="bold">ПОСЛЕ (новая дорога)</text>
  <!-- Nodes -->
  <circle cx="305" cy="58" r="10" fill="#3a1a1a" stroke="#e85d5d" stroke-width="2"/>
  <text x="305" y="62" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f08080">A</text>
  <circle cx="255" cy="140" r="10" fill="#3a1a1a" stroke="#e85d5d" stroke-width="2"/>
  <text x="255" y="144" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f08080">B</text>
  <circle cx="355" cy="140" r="10" fill="#3a1a1a" stroke="#e85d5d" stroke-width="2"/>
  <text x="355" y="144" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f08080">C</text>
  <circle cx="305" cy="220" r="10" fill="#3a1a1a" stroke="#e85d5d" stroke-width="2"/>
  <text x="305" y="224" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f08080">D</text>
  <!-- Existing roads -->
  <line x1="305" y1="68" x2="260" y2="131" stroke="#e85d5d" stroke-width="3" opacity="0.6"/>
  <line x1="305" y1="68" x2="350" y2="131" stroke="#e85d5d" stroke-width="3" opacity="0.6"/>
  <line x1="260" y1="149" x2="300" y2="212" stroke="#e85d5d" stroke-width="3" opacity="0.6"/>
  <line x1="350" y1="149" x2="310" y2="212" stroke="#e85d5d" stroke-width="3" opacity="0.6"/>
  <!-- New road B-C -->
  <line x1="265" y1="140" x2="345" y2="140" stroke="#e8c44a" stroke-width="3"/>
  <text x="305" y="133" text-anchor="middle" font-family="monospace" font-size="9" fill="#e8c44a" font-weight="bold">0мин ←новая!</text>
  <!-- All use new road: flow arrows -->
  <path d="M305 68 L305 140 L305 220" stroke="#e8c44a" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
  <!-- Total time worse -->
  <rect x="230" y="240" width="150" height="24" fill="#2a1a1a" rx="4" stroke="#e85d5d" stroke-width="1"/>
  <text x="305" y="256" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e85d5d" font-weight="bold">Итого: 120 мин ↑</text>

  <!-- Center divider -->
  <line x1="195" y1="30" x2="195" y2="270" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="195" y="155" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555" transform="rotate(90,195,155)">ДОБАВИЛИ ДОРОГУ</text>
</svg>
