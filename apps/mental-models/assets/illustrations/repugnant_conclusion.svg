<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Title -->
  <text x="200" y="26" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e8c44a" font-weight="bold">Отвратительный вывод · Парфит, 1984</text>
  <!-- World A: few tall bars -->
  <rect x="20" y="45" width="160" height="195" fill="#0d1530" stroke="#4adf8a" stroke-width="1.5" rx="8"/>
  <text x="100" y="64" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4adf8a" font-weight="bold">МИР A</text>
  <text x="100" y="78" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#87ceeb">1 млрд очень счастливых</text>
  <!-- Tall bars (few people, very happy) -->
  <g fill="#4adf8a" opacity="0.8">
    <rect x="42" y="95" width="22" height="120" rx="2"/>
    <rect x="70" y="95" width="22" height="120" rx="2"/>
    <rect x="98" y="95" width="22" height="120" rx="2"/>
    <rect x="126" y="95" width="22" height="120" rx="2"/>
    <rect x="154" y="95" width="22" height="120" rx="2"/>
  </g>
  <!-- Height label -->
  <line x1="30" y1="95" x2="30" y2="215" stroke="#4adf8a" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="24" y="155" text-anchor="end" font-family="sans-serif" font-size="8" fill="#4adf8a" transform="rotate(-90,24,155)">Счастье (высокое)</text>
  <!-- Area label -->
  <rect x="30" y="228" width="140" height="20" fill="#1a2a1a" rx="3"/>
  <text x="100" y="242" text-anchor="middle" font-family="monospace" font-size="9" fill="#4adf8a">Суммарно = S_A</text>

  <!-- World Z: many tiny bars -->
  <rect x="220" y="45" width="160" height="195" fill="#0d1530" stroke="#e85d5d" stroke-width="1.5" rx="8"/>
  <text x="300" y="64" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e85d5d" font-weight="bold">МИР Z</text>
  <text x="300" y="78" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#f08080">1 триллион едва счастливых</text>
  <!-- Many tiny bars (many people, barely happy) -->
  <g fill="#e85d5d" opacity="0.6">
    <rect x="228" y="208" width="4" height="7" rx="1"/>
    <rect x="234" y="208" width="4" height="7" rx="1"/>
    <rect x="240" y="208" width="4" height="7" rx="1"/>
    <rect x="246" y="208" width="4" height="7" rx="1"/>
    <rect x="252" y="208" width="4" height="7" rx="1"/>
    <rect x="258" y="208" width="4" height="7" rx="1"/>
    <rect x="264" y="208" width="4" height="7" rx="1"/>
    <rect x="270" y="208" width="4" height="7" rx="1"/>
    <rect x="276" y="208" width="4" height="7" rx="1"/>
    <rect x="282" y="208" width="4" height="7" rx="1"/>
    <rect x="288" y="208" width="4" height="7" rx="1"/>
    <rect x="294" y="208" width="4" height="7" rx="1"/>
    <rect x="300" y="208" width="4" height="7" rx="1"/>
    <rect x="306" y="208" width="4" height="7" rx="1"/>
    <rect x="312" y="208" width="4" height="7" rx="1"/>
    <rect x="318" y="208" width="4" height="7" rx="1"/>
    <rect x="324" y="208" width="4" height="7" rx="1"/>
    <rect x="330" y="208" width="4" height="7" rx="1"/>
    <rect x="336" y="208" width="4" height="7" rx="1"/>
    <rect x="342" y="208" width="4" height="7" rx="1"/>
    <rect x="348" y="208" width="4" height="7" rx="1"/>
    <rect x="354" y="208" width="4" height="7" rx="1"/>
    <rect x="360" y="208" width="4" height="7" rx="1"/>
    <rect x="366" y="208" width="4" height="7" rx="1"/>
    <rect x="372" y="208" width="4" height="7" rx="1"/>
  </g>
  <!-- Dots to show many more -->
  <text x="300" y="195" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e85d5d" opacity="0.7">× 1 триллион...</text>
  <!-- Total area label (bigger) -->
  <rect x="228" y="228" width="144" height="20" fill="#2a1a1a" rx="3" stroke="#e85d5d" stroke-width="1"/>
  <text x="300" y="242" text-anchor="middle" font-family="monospace" font-size="9" fill="#e85d5d" font-weight="bold">Суммарно = S_Z &gt; S_A</text>

  <!-- Center: Logic says Z is better -->
  <text x="200" y="145" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#888">логика →</text>
  <text x="200" y="160" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#e85d5d" opacity="0.6">Z&gt;A</text>
  <text x="200" y="178" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#888">интуиция →</text>
  <text x="200" y="193" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#4adf8a" opacity="0.6">A&gt;Z</text>

  <!-- Bottom note -->
  <rect x="20" y="257" width="360" height="32" fill="#0d1530" rx="6"/>
  <text x="200" y="272" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa">Логика и интуиция несовместимы.</text>
  <text x="200" y="284" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">Парфит не нашёл выхода. Открытая проблема.</text>
</svg>
